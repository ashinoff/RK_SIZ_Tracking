// ═══════ SIZ CARDS PAGE ═══════
const SizCardsPage = ({ navigate }) => {
  const { user, isLevel, showToast } = useAuth();
  const [cards, setCards] = useState([]);
  const [stats, setStats] = useState({});
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('');
  const [locationFilter, setLocationFilter] = useState('');
  const [modal, setModal] = useState(null); // 'create' | 'batch' | 'batch_issue'
  const [form, setForm] = useState({});
  const [items, setItems] = useState([]);
  const [warehouses, setWarehouses] = useState([]);
  const [employees, setEmployees] = useState([]);
  const canEdit = isLevel('ia', 'spbipk', 'res');

  const load = async () => {
    setLoading(true);
    try {
      const params = new URLSearchParams();
      if (statusFilter) params.set('status', statusFilter);
      if (locationFilter) params.set('location_type', locationFilter);
      if (search) params.set('search', search);
      const [c, s] = await Promise.all([
        apiGet('/siz-cards?' + params.toString()),
        apiGet('/siz-cards-stats')
      ]);
      setCards(c); setStats(s);
    } catch(e) { showToast(e.message, 'error'); }
    setLoading(false);
  };

  useEffect(() => { load(); }, [statusFilter, locationFilter]);
  useEffect(() => {
    Promise.all([apiGet('/siz/items'), apiGet('/warehouses'), apiGet('/employees')]).then(([i, w, e]) => { setItems(i); setWarehouses(w); setEmployees(e); });
  }, []);

  const handleSearch = () => load();
  const handleKeyDown = (e) => { if (e.key === 'Enter') load(); };

  const daysLeft = (card) => {
    if (!card.exploitation_end || card.status !== 'issued') return null;
    const diff = Math.ceil((new Date(card.exploitation_end) - new Date()) / (1000*60*60*24));
    return diff;
  };

  const daysClass = (d) => { if (d === null) return ''; if (d < 0) return 'danger'; if (d < 30) return 'warn'; return 'ok'; };

  const statusLabel = { in_stock: 'На складе', issued: 'Выдано', expired: 'Просрочено', written_off: 'Списано', returned: 'Возвращено' };
  const locationLabel = { warehouse: 'Склад', employee: 'Сотрудник', written_off: 'Списано' };

  const getDisplayStatus = (card) => {
    if (card.status === 'issued' && card.exploitation_end && new Date(card.exploitation_end) < new Date()) return 'expired';
    return card.status;
  };

  const createCard = async () => {
    try {
      if (modal === 'batch_issue') {
        if (!form.siz_item_id || !form.warehouse_id || !form.employee_id || !form.quantity) return showToast('Заполните все поля', 'error');
        const r = await apiPost('/siz-cards/batch-issue', form);
        showToast(`${r.message}`);
      } else if (modal === 'batch') {
        if (!form.siz_item_id || !form.warehouse_id) return showToast('Выберите СИЗ и склад', 'error');
        const qty = parseInt(form.quantity) || 1;
        await apiPost('/siz-cards/batch', { ...form, quantity: qty });
        showToast(`Создано карточек: ${qty}`);
      } else {
        if (!form.siz_item_id || !form.warehouse_id) return showToast('Выберите СИЗ и склад', 'error');
        await apiPost('/siz-cards', form);
        showToast('Карточка создана');
      }
      setModal(null); setForm({}); load();
    } catch(e) { showToast(e.message, 'error'); }
  };

  const selectedItem = items.find(i => i.id === form.siz_item_id);
  const expLabel = (m) => m ? (m >= 12 ? (m % 12 === 0 ? `${m/12} г.` : `${m} мес.`) : `${m} мес.`) : '—';

  const fioShort = (c) => c.last_name ? `${c.last_name} ${(c.first_name||'')[0]||''}.${(c.middle_name||'')[0]||''}.` : '—';

  if (loading && !cards.length) return <Loader />;

  return <div>
    <div className="page-top"><div><h1>Карточки СИЗ</h1><div className="sub">Индивидуальный учёт средств защиты</div></div>
      <div style={{display:'flex',gap:8}}>
        {canEdit && <button className="btn btn-p" onClick={() => { setForm({}); setModal('create'); }}><IC.plus style={{width:16,height:16}} /> Создать</button>}
        {canEdit && <button className="btn btn-g btn-sm" onClick={() => { setForm({quantity:1}); setModal('batch_issue'); }}>Пакетная выдача</button>}
        {canEdit && <button className="btn btn-o btn-sm" onClick={() => { setForm({quantity:1}); setModal('batch'); }}>Пакетное создание</button>}
      </div>
    </div>

    <div className="stats">
      <div className="stat"><div className="stat-ic bl"><IC.tag style={{width:22,height:22}}/></div><div><div className="stat-val">{stats.total||0}</div><div className="stat-lbl">Всего карточек</div></div></div>
      <div className="stat"><div className="stat-ic gr"><IC.check style={{width:22,height:22}}/></div><div><div className="stat-val">{stats.issued||0}</div><div className="stat-lbl">Выдано</div></div></div>
      <div className="stat"><div className="stat-ic am"><IC.warehouse style={{width:22,height:22}}/></div><div><div className="stat-val">{stats.in_stock||0}</div><div className="stat-lbl">На складах</div></div></div>
      <div className="stat" style={{cursor:'pointer'}} onClick={() => setStatusFilter('expired')}><div className="stat-ic rd"><IC.alertTriangle style={{width:22,height:22}}/></div><div><div className="stat-val">{stats.expired||0}</div><div className="stat-lbl">Просрочено</div></div></div>
    </div>

    <div className="card">
      <div className="filter-bar">
        <SearchInput value={search} onChange={setSearch} placeholder="Поиск по номеру, названию, ФИО..." />
        <button className="btn btn-p btn-sm" onClick={handleSearch}>Найти</button>
        <select className="fc" style={{width:'auto',padding:'6px 28px 6px 10px',fontSize:12}} value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
          <option value="">Все статусы</option>
          <option value="in_stock">На складе</option>
          <option value="issued">Выдано</option>
          <option value="expired">Просрочено</option>
          <option value="written_off">Списано</option>
        </select>
        <select className="fc" style={{width:'auto',padding:'6px 28px 6px 10px',fontSize:12}} value={locationFilter} onChange={e => setLocationFilter(e.target.value)}>
          <option value="">Все места</option>
          <option value="warehouse">Склад</option>
          <option value="employee">Сотрудник</option>
        </select>
        {(statusFilter || locationFilter) && <button className="btn btn-o btn-sm" onClick={() => { setStatusFilter(''); setLocationFilter(''); }}>Сбросить</button>}
      </div>
      <div className="card-body np"><div className="tbl-wrap"><table><thead><tr>
        <th>Номер</th><th>Наименование СИЗ</th><th>Размер</th><th>Статус</th><th>Местонахождение</th><th>Срок</th><th>Действия</th>
      </tr></thead><tbody>
        {cards.length ? cards.map(c => {
          const ds = getDisplayStatus(c);
          const dl = daysLeft(c);
          return <tr key={c.id} className={ds === 'expired' ? 'row-expired' : ''}>
            <td><span className="badge b-blue" style={{fontFamily:'JetBrains Mono',fontSize:11,cursor:'pointer'}} onClick={() => navigate('/siz-card/'+c.id)}>{c.card_number}</span></td>
            <td style={{fontWeight:600}}>{c.item_name}</td>
            <td>{c.size_value || '—'}</td>
            <td><span className={`status-badge st-${ds}`}>{statusLabel[ds] || ds}</span></td>
            <td style={{fontSize:12}}>
              {c.location_type === 'employee' && <span style={{cursor:'pointer',color:'var(--blue)'}} onClick={() => navigate('/employee/'+c.employee_id)}>{fioShort(c)}</span>}
              {c.location_type === 'warehouse' && <span>{c.warehouse_name || '—'}</span>}
              {c.location_type === 'written_off' && <span style={{color:'var(--tx3)'}}>Списано</span>}
              {c.enterprise_name && <div style={{fontSize:10,color:'var(--tx3)'}}>{c.enterprise_name}{c.res_name ? ` → ${c.res_name}` : ''}</div>}
            </td>
            <td>{dl !== null ? <span className={`days-badge ${daysClass(dl)}`}>{dl < 0 ? `${Math.abs(dl)} дн. просрочка` : `${dl} дн.`}</span> : '—'}</td>
            <td><button className="btn-icon" onClick={() => navigate('/siz-card/'+c.id)}><IC.eye style={{width:16,height:16}}/></button></td>
          </tr>;
        }) : <tr><td colSpan="7"><Empty icon={IC.tag} text="Нет карточек СИЗ" /></td></tr>}
      </tbody></table></div></div>
    </div>

    {modal && modal !== 'batch_issue' && <Modal open onClose={() => setModal(null)} title={modal === 'batch' ? 'Пакетное создание карточек' : 'Создать карточку СИЗ'}
      footer={<><button className="btn btn-o" onClick={() => setModal(null)}>Отмена</button><button className="btn btn-p" onClick={createCard}>Создать</button></>}>
      <div className="fg"><label>Наименование СИЗ *</label>
        <select className="fc" value={form.siz_item_id||''} onChange={e => setForm({...form, siz_item_id: e.target.value})}>
          <option value="">Выберите...</option>
          {items.map(i => <option key={i.id} value={i.id}>{i.category_name ? `[${i.category_name}] ` : ''}{i.name}{i.exploitation_months ? ` (${expLabel(i.exploitation_months)})` : ''}</option>)}
        </select>
      </div>
      <div className="fr">
        <div className="fg"><label>Размер</label><input className="fc" value={form.size_value||''} onChange={e => setForm({...form, size_value: e.target.value})} /></div>
        <div className="fg"><label>Склад *</label>
          <select className="fc" value={form.warehouse_id||''} onChange={e => setForm({...form, warehouse_id: e.target.value})}>
            <option value="">Выберите...</option>
            {warehouses.map(w => <option key={w.id} value={w.id}>{w.name}{w.res_name ? ` (${w.res_name})` : ''}</option>)}
          </select>
        </div>
      </div>
      {modal === 'batch' && <div className="fg"><label>Количество *</label><input className="fc" type="number" min="1" max="500" value={form.quantity||1} onChange={e => setForm({...form, quantity: e.target.value})} /></div>}
      <div className="fr">
        <div className="fg"><label>Дата изготовления</label><input className="fc" type="date" value={form.manufacture_date||''} onChange={e => setForm({...form, manufacture_date: e.target.value})} /></div>
        <div className="fg"><label>Документ</label><input className="fc" value={form.document_reference||''} onChange={e => setForm({...form, document_reference: e.target.value})} placeholder="Накладная, акт..." /></div>
      </div>
      <div className="fg"><label>Примечания</label><textarea className="fc" value={form.notes||''} onChange={e => setForm({...form, notes: e.target.value})} /></div>
    </Modal>}

    {modal === 'batch_issue' && <Modal open onClose={() => setModal(null)} title="Пакетная выдача СИЗ" wide
      footer={<><button className="btn btn-o" onClick={() => setModal(null)}>Отмена</button><button className="btn btn-g" onClick={createCard}>Выдать</button></>}>
      <div style={{padding:12,background:'var(--blue-l)',borderRadius:8,marginBottom:16,fontSize:12,color:'var(--blue)'}}>
        <strong>Последовательные таймеры:</strong> при выдаче нескольких одинаковых СИЗ каждая единица начинает «тикать» по очереди. Например, 12 перчаток (срок 1 мес.) = первая истекает через 1 мес., вторая через 2 мес., ... последняя через 12 мес.
      </div>
      <div className="fg"><label>Сотрудник *</label>
        <select className="fc" value={form.employee_id||''} onChange={e => setForm({...form, employee_id: e.target.value})}>
          <option value="">Выберите...</option>
          {employees.map(e => <option key={e.id} value={e.id}>{e.last_name} {e.first_name} {e.middle_name}{e.position_name ? ` (${e.position_name})` : ''}</option>)}
        </select>
      </div>
      <div className="fg"><label>Наименование СИЗ *</label>
        <select className="fc" value={form.siz_item_id||''} onChange={e => setForm({...form, siz_item_id: e.target.value})}>
          <option value="">Выберите...</option>
          {items.map(i => <option key={i.id} value={i.id}>{i.category_name ? `[${i.category_name}] ` : ''}{i.name}{i.exploitation_months ? ` (${expLabel(i.exploitation_months)})` : ''}</option>)}
        </select>
      </div>
      <div className="fr">
        <div className="fg"><label>Склад (откуда) *</label>
          <select className="fc" value={form.warehouse_id||''} onChange={e => setForm({...form, warehouse_id: e.target.value})}>
            <option value="">Выберите...</option>
            {warehouses.map(w => <option key={w.id} value={w.id}>{w.name}{w.res_name ? ` (${w.res_name})` : ''}</option>)}
          </select>
        </div>
        <div className="fg"><label>Количество *</label><input className="fc" type="number" min="1" max="100" value={form.quantity||1} onChange={e => setForm({...form, quantity: e.target.value})} /></div>
      </div>
      <div className="fr">
        <div className="fg"><label>Дата выдачи</label><input className="fc" type="date" value={form.movement_date||''} onChange={e => setForm({...form, movement_date: e.target.value})} /></div>
        <div className="fg"><label>Документ</label><input className="fc" value={form.document_reference||''} onChange={e => setForm({...form, document_reference: e.target.value})} /></div>
      </div>
      {selectedItem && form.quantity > 0 && <div style={{marginTop:12,padding:12,background:'var(--green-l)',borderRadius:8,fontSize:12}}>
        <div style={{fontWeight:700,color:'var(--green)',marginBottom:6}}>Предварительный расчёт сроков:</div>
        {Array.from({length: Math.min(parseInt(form.quantity)||1, 12)}, (_, idx) => {
          const em = selectedItem.exploitation_months || 12;
          const startM = idx * em;
          const endM = (idx + 1) * em;
          return <div key={idx} style={{display:'flex',gap:8,padding:'2px 0',borderBottom:'1px solid rgba(0,0,0,.06)'}}>
            <span style={{fontFamily:'JetBrains Mono',color:'var(--tx2)',width:20}}>#{idx+1}</span>
            <span>начало: <strong>+{startM} мес.</strong></span>
            <span style={{color:'var(--tx3)'}}>→</span>
            <span>конец: <strong>+{endM} мес.</strong></span>
          </div>;
        })}
        {(parseInt(form.quantity)||0) > 12 && <div style={{color:'var(--tx3)',marginTop:4}}>...и ещё {(parseInt(form.quantity)||0) - 12} шт.</div>}
      </div>}
    </Modal>}
  </div>;
};

// ═══════ SIZ CARD DETAIL ═══════
const SizCardDetail = ({ id, navigate }) => {
  const { user, isLevel, showToast } = useAuth();
  const [card, setCard] = useState(null);
  const [movements, setMovements] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null); // 'issue' | 'return' | 'transfer' | 'write_off'
  const [form, setForm] = useState({});
  const [employees, setEmployees] = useState([]);
  const [warehouses, setWarehouses] = useState([]);
  const canEdit = isLevel('ia', 'spbipk', 'res');

  const load = async () => {
    try {
      const [c, m] = await Promise.all([apiGet(`/siz-cards/${id}`), apiGet(`/siz-cards/${id}/movements`)]);
      setCard(c); setMovements(m); setLoading(false);
    } catch(e) { showToast(e.message, 'error'); setLoading(false); }
  };
  useEffect(() => { load(); Promise.all([apiGet('/employees'), apiGet('/warehouses')]).then(([e, w]) => { setEmployees(e); setWarehouses(w); }); }, [id]);

  const daysLeft = () => {
    if (!card?.exploitation_end || card.status !== 'issued') return null;
    return Math.ceil((new Date(card.exploitation_end) - new Date()) / (1000*60*60*24));
  };

  const isExpired = () => {
    const dl = daysLeft();
    return dl !== null && dl < 0;
  };

  const statusLabel = { in_stock: 'На складе', issued: 'Выдано', expired: 'Просрочено', written_off: 'Списано' };
  const moveLabel = { receipt: 'Поступление', issue: 'Выдача', return: 'Возврат', transfer: 'Перемещение', write_off: 'Списание' };

  const doAction = async () => {
    try {
      if (modal === 'issue') {
        if (!form.employee_id) return showToast('Выберите сотрудника', 'error');
        await apiPost(`/siz-cards/${id}/issue`, form);
        showToast('СИЗ выдано сотруднику');
      } else if (modal === 'return') {
        if (!form.warehouse_id) return showToast('Выберите склад', 'error');
        await apiPost(`/siz-cards/${id}/return`, form);
        showToast('СИЗ возвращено на склад');
      } else if (modal === 'transfer') {
        if (!form.to_warehouse_id) return showToast('Выберите склад назначения', 'error');
        await apiPost(`/siz-cards/${id}/transfer`, form);
        showToast('СИЗ перемещено');
      } else if (modal === 'write_off') {
        await apiPost(`/siz-cards/${id}/write-off`, form);
        showToast('СИЗ списано');
      }
      setModal(null); setForm({}); load();
    } catch(e) { showToast(e.message, 'error'); }
  };

  if (loading) return <Loader />;
  if (!card) return <div><button className="btn btn-o" onClick={() => navigate('/siz-cards')}><IC.arrowLeft style={{width:16,height:16}}/> Назад</button><Empty icon={IC.tag} text="Карточка не найдена" /></div>;

  const dl = daysLeft();
  const dispStatus = isExpired() ? 'expired' : card.status;
  const fio = card.last_name ? `${card.last_name} ${card.first_name || ''} ${card.middle_name || ''}`.trim() : null;

  return <div>
    <div className="breadcrumb"><span onClick={() => navigate('/siz-cards')}>Карточки СИЗ</span> / <span style={{color:'var(--tx1)',cursor:'default'}}>{card.card_number}</span></div>
    <div className="page-top"><div>
      <h1 style={{display:'flex',alignItems:'center',gap:12}}>{card.card_number} <span className={`status-badge st-${dispStatus}`}>{statusLabel[dispStatus] || card.status}</span></h1>
      <div className="sub">{card.item_name}{card.category_name ? ` — ${card.category_name}` : ''}</div>
    </div>
      {canEdit && <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {card.status === 'in_stock' && <button className="btn btn-p btn-sm" onClick={() => { setForm({}); setModal('issue'); }}>Выдать</button>}
        {card.status === 'in_stock' && <button className="btn btn-o btn-sm" onClick={() => { setForm({}); setModal('transfer'); }}>Переместить</button>}
        {(card.status === 'issued' || isExpired()) && <button className="btn btn-o btn-sm" onClick={() => { setForm({}); setModal('return'); }}>Вернуть</button>}
        {card.status !== 'written_off' && <button className="btn btn-d btn-sm" onClick={() => { setForm({}); setModal('write_off'); }}>Списать</button>}
      </div>}
    </div>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
      <div className="card"><div className="card-h"><h3>Информация о СИЗ</h3></div><div className="card-body">
        {[['Номер карточки', card.card_number],['Наименование', card.item_name],['Категория', card.category_name],['Код', card.item_code],['Размер', card.size_value || '—'],['Пол', card.item_gender || '—'],['Сезон', card.season || '—'],['Срок эксплуатации', card.exploitation_years ? (card.exploitation_years >= 1 ? `${card.exploitation_years} г.` : `${Math.round(card.exploitation_years * 12)} мес.`) : '—']].map(([l,v],i) =>
          <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:i<7?'1px solid var(--border)':'none'}}>
            <span style={{fontSize:12,color:'var(--tx2)',fontWeight:600}}>{l}</span>
            <span style={{fontSize:13,fontWeight:600}}>{v || '—'}</span>
          </div>)}
      </div></div>
      <div className="card"><div className="card-h"><h3>Местонахождение</h3></div><div className="card-body">
        {[
          ['Статус', <span className={`status-badge st-${dispStatus}`}>{statusLabel[dispStatus] || card.status}</span>],
          ['Тип расположения', card.location_type === 'employee' ? 'У сотрудника' : card.location_type === 'warehouse' ? 'На складе' : 'Списано'],
          card.location_type === 'employee' ? ['Сотрудник', fio ? <span style={{cursor:'pointer',color:'var(--blue)',fontWeight:600}} onClick={() => navigate('/employee/'+card.employee_id)}>{fio}</span> : '—'] : null,
          card.location_type === 'employee' ? ['Должность', card.position_name || '—'] : null,
          card.location_type === 'warehouse' ? ['Склад', card.warehouse_name || '—'] : null,
          ['Предприятие', card.enterprise_name || '—'],
          ['РЭС / Служба', card.res_name || '—'],
          ['Подразделение', card.department_name || '—'],
        ].filter(Boolean).map(([l,v],i) =>
          <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)',alignItems:'center'}}>
            <span style={{fontSize:12,color:'var(--tx2)',fontWeight:600}}>{l}</span>
            <span style={{fontSize:13,fontWeight:600}}>{v || '—'}</span>
          </div>)}
        {card.status === 'issued' && <div style={{marginTop:12,padding:12,borderRadius:8,background:isExpired()?'var(--red-l)':dl!==null&&dl<30?'var(--amber-l)':'var(--green-l)'}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--tx2)',marginBottom:4}}>СРОКИ ЭКСПЛУАТАЦИИ</div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:2}}>
            <span>Дата выдачи:</span><span style={{fontWeight:700}}>{card.issue_date || '—'}</span></div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:2}}>
            <span>Начало эксплуатации:</span><span style={{fontWeight:700}}>{card.exploitation_start || '—'}</span></div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:2}}>
            <span>Конец эксплуатации:</span><span style={{fontWeight:700}}>{card.exploitation_end || '—'}</span></div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginTop:6,paddingTop:6,borderTop:'1px solid rgba(0,0,0,.1)'}}>
            <span style={{fontWeight:700}}>Осталось:</span>
            <span className={`days-badge ${dl<0?'danger':dl<30?'warn':'ok'}`} style={{fontSize:12}}>
              {dl < 0 ? `Просрочено на ${Math.abs(dl)} дн.` : `${dl} дн.`}
            </span>
          </div>
        </div>}
      </div></div>
    </div>

    <div className="card"><div className="card-h"><h3>История перемещений</h3></div><div className="card-body np"><div className="tbl-wrap"><table><thead><tr>
      <th>Дата</th><th>Тип</th><th>Откуда</th><th>Куда</th><th>Кем</th><th>Документ</th><th>Примечания</th>
    </tr></thead><tbody>
      {movements.length ? movements.map(m => <tr key={m.id}>
        <td style={{fontFamily:'JetBrains Mono',fontSize:12}}>{m.movement_date}</td>
        <td><span className="badge b-blue">{moveLabel[m.movement_type] || m.movement_type}</span></td>
        <td style={{fontSize:12}}>
          {m.from_warehouse_name && <span>{m.from_warehouse_name}</span>}
          {m.from_employee_last && <span>{m.from_employee_last} {(m.from_employee_first||'')[0]}.</span>}
          {!m.from_warehouse_name && !m.from_employee_last && '—'}
        </td>
        <td style={{fontSize:12}}>
          {m.to_warehouse_name && <span>{m.to_warehouse_name}</span>}
          {m.to_employee_last && <span>{m.to_employee_last} {(m.to_employee_first||'')[0]}.</span>}
          {!m.to_warehouse_name && !m.to_employee_last && '—'}
        </td>
        <td style={{fontSize:12,color:'var(--tx2)'}}>{m.moved_by_name || '—'}</td>
        <td style={{fontSize:12}}>{m.document_reference || '—'}</td>
        <td style={{fontSize:12,color:'var(--tx2)'}}>{m.notes || '—'}</td>
      </tr>) : <tr><td colSpan="7"><Empty icon={IC.clock} text="Нет записей о перемещениях" /></td></tr>}
    </tbody></table></div></div></div>

    {modal && <Modal open onClose={() => setModal(null)} title={
      modal === 'issue' ? 'Выдать СИЗ сотруднику' : modal === 'return' ? 'Вернуть СИЗ на склад' :
      modal === 'transfer' ? 'Переместить на другой склад' : 'Списать СИЗ'
    } footer={<><button className="btn btn-o" onClick={() => setModal(null)}>Отмена</button>
      <button className={`btn ${modal==='write_off'?'btn-d':'btn-p'}`} onClick={doAction}>{modal==='write_off'?'Списать':'Выполнить'}</button></>}>
      {modal === 'issue' && <div className="fg"><label>Сотрудник *</label>
        <select className="fc" value={form.employee_id||''} onChange={e => setForm({...form, employee_id: e.target.value})}>
          <option value="">Выберите...</option>
          {employees.map(e => <option key={e.id} value={e.id}>{e.last_name} {e.first_name} {e.middle_name} {e.position_name ? `(${e.position_name})` : ''}</option>)}
        </select>
      </div>}
      {modal === 'return' && <div className="fg"><label>Склад *</label>
        <select className="fc" value={form.warehouse_id||''} onChange={e => setForm({...form, warehouse_id: e.target.value})}>
          <option value="">Выберите...</option>
          {warehouses.map(w => <option key={w.id} value={w.id}>{w.name}{w.res_name ? ` (${w.res_name})` : ''}</option>)}
        </select>
      </div>}
      {modal === 'transfer' && <div className="fg"><label>Склад назначения *</label>
        <select className="fc" value={form.to_warehouse_id||''} onChange={e => setForm({...form, to_warehouse_id: e.target.value})}>
          <option value="">Выберите...</option>
          {warehouses.filter(w => w.id !== card.warehouse_id).map(w => <option key={w.id} value={w.id}>{w.name}{w.res_name ? ` (${w.res_name})` : ''}</option>)}
        </select>
      </div>}
      <div className="fr">
        <div className="fg"><label>Дата</label><input className="fc" type="date" value={form.movement_date||''} onChange={e => setForm({...form, movement_date: e.target.value})} /></div>
        <div className="fg"><label>Документ</label><input className="fc" value={form.document_reference||''} onChange={e => setForm({...form, document_reference: e.target.value})} /></div>
      </div>
      <div className="fg"><label>Примечания</label><textarea className="fc" value={form.notes||''} onChange={e => setForm({...form, notes: e.target.value})} /></div>
    </Modal>}
  </div>;
};

const App = () => {
  const { user, logout, isLevel } = useAuth();
  const [path, setPath] = useState(window.location.hash.replace('#', '') || '/');

  useEffect(() => {
    const h = () => setPath(window.location.hash.replace('#', '') || '/');
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);
  const navigate = to => { window.location.hash = to; };

  if (!user) return <LoginPage />;

  const empMatch = path.match(/^\/employee\/(.+)$/);
  const sizCardMatch = path.match(/^\/siz-card\/(.+)$/);
  let content;
  if (path === '/' || path === '') content = <Dashboard />;
  else if (path === '/org') content = <OrgStructure />;
  else if (path === '/warehouses') content = <Warehouses />;
  else if (path === '/positions') content = <Positions />;
  else if (path === '/directories') content = <Directories />;
  else if (path === '/ton') content = <TonPage />;
  else if (path === '/employees') content = <EmployeesPage navigate={navigate} />;
  else if (empMatch) content = <EmployeeCard id={empMatch[1]} navigate={navigate} />;
  else if (path === '/siz-cards') content = <SizCardsPage navigate={navigate} />;
  else if (sizCardMatch) content = <SizCardDetail id={sizCardMatch[1]} navigate={navigate} />;
  else if (path === '/admin/users') content = <AdminUsers />;
  else content = <Dashboard />;

  const NL = ({ to, icon: Icon, children, levels }) => {
    if (levels && !levels.includes(user.role_level)) return null;
    return <div className={`sb-link ${path === to ? 'active' : ''}`} onClick={() => navigate(to)}><Icon style={{ width: 18, height: 18 }} />{children}</div>;
  };

  const initials = (user.full_name || '').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();

  return <div className="app">
    <aside className="sidebar">
      <div className="sb-logo">
        <div className="sb-logo-icon"><IC.shield style={{ width: 22, height: 22, color: '#fff' }} /></div>
        <div><div className="sb-logo-text">Россети-Юг</div><div className="sb-logo-sub">Кубаньэнерго — СИЗ</div></div>
      </div>
      <nav className="sb-nav">
        <div className="sb-section">Основное</div>
        <NL to="/" icon={IC.home}>Панель управления</NL>
        <NL to="/employees" icon={IC.users}>Карточки персонала</NL>
        <NL to="/siz-cards" icon={IC.tag}>Карточки СИЗ</NL>
        <NL to="/warehouses" icon={IC.warehouse}>Склады</NL>

        <div className="sb-section">Справочники</div>
        <NL to="/directories" icon={IC.shield}>Категории СИЗ</NL>
        <NL to="/positions" icon={IC.briefcase}>Должности</NL>
        <NL to="/ton" icon={IC.scroll} levels={['ia', 'spbipk']}>ТОН (Нормы)</NL>

        <div className="sb-section">Структура</div>
        <NL to="/org" icon={IC.building}>Оргструктура</NL>

        {isLevel('ia') && <>
          <div className="sb-section">Администрирование</div>
          <NL to="/admin/users" icon={IC.settings} levels={['ia']}>Пользователи</NL>
        </>}
      </nav>
      <div className="sb-footer">
        <div className="sb-user">
          <div className="sb-user-ava">{initials}</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div className="sb-user-name" style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{user.full_name}</div>
            <div className="sb-user-role">{user.role_display_name}</div>
          </div>
        </div>
        <button className="btn btn-o btn-sm" style={{ width: '100%', justifyContent: 'center', marginTop: 8, color: 'rgba(255,255,255,.5)', borderColor: 'rgba(255,255,255,.1)' }} onClick={logout}>
          <IC.logout style={{ width: 14, height: 14 }} /> Выйти
        </button>
        <div style={{ fontSize: 10, color: 'rgba(255,255,255,.2)', textAlign: 'center', marginTop: 10 }}>СИЗ v4.0 — 2026</div>
      </div>
    </aside>
    <main className="main">{content}</main>
  </div>;
};

// ═══════ RENDER ═══════
ReactDOM.createRoot(document.getElementById('root')).render(<AuthProvider><App /></AuthProvider>);
</script>
</body>
</html>
