            {sp.warehouses?.map(w => <div key={w.id} style={{ marginLeft: 42, fontSize: 12, color: 'var(--tx2)', padding: '2px 0', display:'flex', alignItems:'center', gap:6 }}><IC.package style={{width:12,height:12,color:'var(--amber)'}}/> {w.name}</div>)}
          </div>)}

          {ent.res_units?.map(ru => <div key={ru.id} className="tree-node child">
            <div className="tree-item" onClick={() => toggle(ru.id)}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{cursor:'pointer',transition:'transform .2s',transform:collapsed[ru.id]?'rotate(-90deg)':'rotate(0deg)'}}><IC.chevDown style={{width:14,height:14,color:'var(--tx3)'}}/></div>
                <div className="tree-icon res" style={{ width: 26, height: 26 }}><IC.users style={{ width: 13, height: 13 }} /></div>
                <div><div style={{ fontWeight: 600, fontSize: 13 }}>{ru.name}</div><div style={{ fontSize: 11, color: 'var(--tx3)' }}>РЭС / Служба</div></div>
              </div>
              {(canEdit || isLevel('spbipk')) && <div style={{ display: 'flex', gap: 4 }} onClick={e => e.stopPropagation()}>
                <button className="btn-icon" onClick={() => { setForm({}); setModal({ type: 'dept', parentId: ru.id }); }}><IC.plus style={{ width: 14, height: 14 }} /></button>
                {canEdit && !ru.warehouses?.length && <button className="btn-icon" onClick={() => { setForm({ name: `Склад ${ru.name}` }); setModal({ type: 'warehouse', whType: 'res', resUnitId: ru.id, enterpriseId: ent.id }); }}><IC.warehouse style={{ width: 14, height: 14, color: 'var(--green)' }} /></button>}
                {canEdit && <button className="btn-icon" onClick={() => { setDelModal({type:'res',id:ru.id,name:ru.name}); setDelPass(''); setDelErr(''); }}><IC.trash style={{ width: 14, height: 14, color: 'var(--red)' }} /></button>}
              </div>}
            </div>
            {!collapsed[ru.id] && <>
              {ru.warehouses?.map(w => <div key={w.id} style={{ marginLeft: 42, fontSize: 12, color: 'var(--tx2)', padding: '2px 0', display:'flex', alignItems:'center', gap:6 }}><IC.package style={{width:12,height:12,color:'var(--green)'}}/> {w.name}</div>)}
              {ru.departments?.map(dp => <div key={dp.id} className="tree-node child">
                <div className="tree-item">
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <div className="tree-icon dep" style={{ width: 24, height: 24 }}><IC.folder style={{ width: 12, height: 12 }} /></div>
                    <div style={{ fontWeight: 600, fontSize: 13 }}>{dp.name}</div>
                  </div>
                  {canEdit && <div style={{display:'flex',gap:4}}>
                    <button className="btn-icon" onClick={() => { setDelModal({type:'dept',id:dp.id,name:dp.name}); setDelPass(''); setDelErr(''); }}><IC.trash style={{ width: 14, height: 14, color: 'var(--red)' }} /></button>
                  </div>}
                </div>
              </div>)}
            </>}
          </div>)}
        </>}
        </div>)}
        {!o.enterprises?.length && <Empty icon={IC.building} text="Нет предприятий" />}
      </div>
    </div>)}

    <Modal open={!!modal} onClose={() => setModal(null)} title={`${form.id ? 'Редактировать' : 'Добавить'} — ${labels[modal?.type] || ''}`}
      footer={<><button className="btn btn-o" onClick={() => setModal(null)}>Отмена</button><button className="btn btn-p" onClick={save}>Сохранить</button></>}>
      <div className="fg"><label>Название</label><input className="fc" value={form.name || ''} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="Введите название" /></div>
      {modal?.type === 'enterprise' && <div className="fg"><label>Код</label><input className="fc" value={form.code || ''} onChange={e => setForm({ ...form, code: e.target.value })} /></div>}
    </Modal>

    <Modal open={!!delModal} onClose={() => setDelModal(null)} title={`Удалить: ${delModal?.name || ''}`}
      footer={<><button className="btn btn-o" onClick={() => setDelModal(null)}>Отмена</button><button className="btn btn-d" onClick={confirmDelete}>Удалить</button></>}>
      <p style={{fontSize:13,color:'var(--tx2)',marginBottom:16}}>Для удаления элемента оргструктуры введите пароль подтверждения:</p>
      {delErr && <div style={{background:'var(--red-l)',color:'var(--red)',padding:'8px 12px',borderRadius:8,fontSize:12,fontWeight:600,marginBottom:12}}>{delErr}</div>}
      <div className="fg"><label>Пароль</label><input className="fc" type="password" value={delPass} onChange={e => {setDelPass(e.target.value); setDelErr('');}} placeholder="Введите пароль" /></div>
    </Modal>
  </div>;
};

// ═══════ WAREHOUSES ═══════
const Warehouses = () => {
  const { user, isLevel, showToast } = useAuth();
  const [warehouses, setWarehouses] = useState([]);
  const [selected, setSelected] = useState(null);
  const [stock, setStock] = useState([]);
  const [movements, setMovements] = useState([]);
  const [tab, setTab] = useState('stock');
  const [items, setItems] = useState([]);
  const [categories, setCategories] = useState([]);
  const [transferModal, setTransferModal] = useState(false);
  const [receiptModal, setReceiptModal] = useState(false);
  const [tf, setTf] = useState({});
  const [loading, setLoading] = useState(true);
  const [stockCollapsed, setStockCollapsed] = useState({});
  const [rcptCat, setRcptCat] = useState('');
  const [rcptSearch, setRcptSearch] = useState('');

  const load = () => {
    setLoading(true);
    Promise.all([apiGet('/warehouses'), apiGet('/siz/items'), apiGet('/siz/categories')]).then(([wh, it, cats]) => {
      setWarehouses(wh); setItems(it); setCategories(cats); setLoading(false);
      if (wh.length && !selected) { setSelected(wh[0].id); loadStock(wh[0].id); }
    });
  };
  useEffect(load, []);

  const loadStock = (id) => {
    apiGet(`/warehouses/${id}/stock`).then(setStock);
    apiGet(`/warehouses/${id}/movements`).then(setMovements);
  };
  useEffect(() => { if (selected) loadStock(selected); }, [selected]);

  const whTypeLabel = { ia: 'ИА', spbipk: 'СПБиПК', res: 'РЭС' };

  const getTransferTargets = () => {
    const src = warehouses.find(w => w.id === selected);
    if (!src) return [];
    if (isLevel('ia') && src.warehouse_type === 'ia') return warehouses.filter(w => w.warehouse_type === 'spbipk');
    if (isLevel('spbipk') && src.warehouse_type === 'spbipk') return warehouses.filter(w => w.warehouse_type === 'res');
    if (isLevel('res') && src.warehouse_type === 'res') return warehouses.filter(w => w.warehouse_type === 'res' && w.id !== selected);
    if (isLevel('ia')) return warehouses.filter(w => w.id !== selected);
    return [];
  };

  const doTransfer = async () => {
    if (!tf.to_warehouse_id || !tf.siz_item_id || !tf.quantity) return;
    try {
      await apiPost('/warehouses/transfer', { from_warehouse_id: selected, to_warehouse_id: tf.to_warehouse_id, siz_item_id: tf.siz_item_id, size_value: tf.size_value || '', quantity: parseInt(tf.quantity) });
      showToast('Перемещено'); setTransferModal(false); setTf({}); loadStock(selected);
    } catch (e) { showToast(e.message, 'error'); }
  };

  const doReceipt = async () => {
    if (!tf.siz_item_id || !tf.quantity) return;
    try {
      await apiPost(`/warehouses/${selected}/receipt`, { siz_item_id: tf.siz_item_id, size_value: tf.size_value || '', quantity: parseInt(tf.quantity), document_reference: tf.doc || '' });
      showToast('Приход оформлен'); setReceiptModal(false); setTf({}); setRcptCat(''); setRcptSearch(''); loadStock(selected);
    } catch (e) { showToast(e.message, 'error'); }
  };

  const canTransfer = isLevel('ia', 'spbipk', 'res');
  const canReceipt = isLevel('ia');

  const CLOTHING_SIZES = ['40-42/158-164','40-42/170-176','40-42/182-188','40-42/194-200','44-46/158-164','44-46/170-176','44-46/182-188','44-46/194-200','48-50/158-164','48-50/170-176','48-50/182-188','48-50/194-200','52-54/158-164','52-54/170-176','52-54/182-188','52-54/194-200','56-58/158-164','56-58/170-176','56-58/182-188','56-58/194-200','60-62/158-164','60-62/170-176','60-62/182-188','60-62/194-200','64-66/158-164','64-66/170-176','64-66/182-188','64-66/194-200','68-70/158-164','68-70/170-176','68-70/182-188','68-70/194-200','72-74/158-164','72-74/170-176','72-74/182-188','72-74/194-200'];
  const SHOE_SIZES = Array.from({length:15},(_,i)=>String(35+i));

  const getSelectedItemCategory = (itemId) => {
    const it = items.find(i => i.id === itemId);
    if (!it) return null;
    const cn = (it.category_code || it.category_name || '').toLowerCase();
    if (cn.includes('одежд') || cn.includes('спецодежд') || cn === 'clothes') return 'clothing';
    if (cn.includes('обувь') || cn === 'shoes') return 'shoes';
    if (cn.includes('каск') || cn === 'helmets') return 'head';
    if (cn.includes('перчат') || cn === 'gloves') return 'gloves';
    return 'other';
  };

  // Фильтрованные СИЗ для модалки прихода
  const filteredReceiptItems = items.filter(i => {
    if (rcptCat && i.category_id !== rcptCat) return false;
    if (rcptSearch && !i.name.toLowerCase().includes(rcptSearch.toLowerCase()) && !(i.code||'').toLowerCase().includes(rcptSearch.toLowerCase())) return false;
    return true;
  });

  const expLabel = (m) => m ? (m >= 12 ? (m % 12 === 0 ? `${m/12} г.` : `${m} мес.`) : `${m} мес.`) : '';

  if (loading) return <Loader />;

  return <div>
    <div className="page-top"><div><h1>Склады</h1><div className="sub">Управление остатками и перемещениями</div></div></div>

    <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', marginBottom: 20 }}>
      {warehouses.map(w => <div key={w.id} onClick={() => setSelected(w.id)}
        style={{ padding: '12px 18px', borderRadius: 10, border: `2px solid ${selected === w.id ? 'var(--blue)' : 'var(--border)'}`, background: selected === w.id ? 'var(--blue-l)' : '#fff', cursor: 'pointer', minWidth: 180, transition: 'all .15s' }}>
        <div style={{ fontWeight: 700, fontSize: 13 }}>{w.name}</div>
        <div style={{ fontSize: 11, color: 'var(--tx2)' }}>{whTypeLabel[w.warehouse_type] || w.warehouse_type} {w.spbipk_name || w.res_name || ''}</div>
      </div>)}
      {!warehouses.length && <Empty icon={IC.warehouse} text="Нет складов. Создайте в оргструктуре." />}
    </div>

    {selected && <>
      <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
        {canReceipt && <button className="btn btn-g btn-sm" onClick={() => { setTf({}); setRcptCat(''); setRcptSearch(''); setReceiptModal(true); }}><IC.plus style={{ width: 14, height: 14 }} /> Приход</button>}
        {canTransfer && <button className="btn btn-p btn-sm" onClick={() => { setTf({}); setTransferModal(true); }}><IC.arrowRight style={{ width: 14, height: 14 }} /> Переместить</button>}
        <button className="btn btn-o btn-sm" onClick={() => exportExcel(stock.map(s => ({'Категория':s.category_name,'Наименование':s.item_name,'Код':s.item_code,'Размер':s.size_value,'Кол-во':s.quantity,'Ед.':s.unit})), 'Остатки.xlsx', 'Остатки')}>Экспорт остатков</button>
        <button className="btn btn-o btn-sm" onClick={() => exportExcel(movements.map(m => ({'Тип':m.movement_type,'СИЗ':m.item_name,'Кол-во':m.quantity,'Откуда':m.from_warehouse_name,'Куда':m.to_warehouse_name,'Дата':m.movement_date,'Кто':m.moved_by_name})), 'Перемещения.xlsx', 'Перемещения')}>Экспорт движений</button>
      </div>

      <div className="tabs">
        <button className={`tab ${tab === 'stock' ? 'active' : ''}`} onClick={() => setTab('stock')}>Остатки ({stock.length})</button>
        <button className={`tab ${tab === 'moves' ? 'active' : ''}`} onClick={() => setTab('moves')}>Движения ({movements.length})</button>
      </div>

      {tab === 'stock' && <div className="card"><div className="card-body">
        {(() => {
          const cats = {};
          stock.forEach(s => {
            const cn = s.category_name || 'Без категории';
            if (!cats[cn]) cats[cn] = {};
            const key = s.siz_item_id + '|' + (s.item_name||'');
            if (!cats[cn][key]) cats[cn][key] = { item_name: s.item_name, item_code: s.item_code, unit: s.unit, total: 0, sizes: [] };
            cats[cn][key].total += s.quantity;
            if (s.size_value) cats[cn][key].sizes.push({ size: s.size_value, qty: s.quantity });
          });
          const catKeys = Object.keys(cats);
          if (!catKeys.length) return <Empty icon={IC.package} text="Склад пуст" />;
          return catKeys.map(cn => <div key={cn} style={{marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:8,display:'flex',alignItems:'center',gap:8}}>
              <span className="badge b-blue">{cn}</span>
            </div>
            {Object.entries(cats[cn]).map(([key, item]) => {
              const isOpen = !stockCollapsed[key];
              return <div key={key} style={{marginBottom:4,border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
                <div onClick={() => setStockCollapsed(p=>({...p,[key]:!p[key]}))}
                  style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 14px',cursor:'pointer',background:isOpen?'var(--blue-l)':'#fff',transition:'all .15s'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{transition:'transform .2s',transform:isOpen?'rotate(0deg)':'rotate(-90deg)'}}><IC.chevDown style={{width:14,height:14,color:'var(--tx3)'}}/></div>
                    <span style={{fontWeight:600,fontSize:13}}>{item.item_name}</span>
                    <span className="badge b-gray">{item.item_code||''}</span>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <span style={{fontFamily:'JetBrains Mono',fontWeight:700,fontSize:14}}>{item.total}</span>
                    <span style={{fontSize:11,color:'var(--tx3)'}}>{item.unit||'шт'}</span>
                  </div>
                </div>
                {isOpen && item.sizes.length > 0 && <div style={{padding:'6px 14px 10px 42px',background:'#FAFBFC',borderTop:'1px solid var(--border)'}}>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {item.sizes.map((sz,i) => <div key={i} style={{padding:'4px 12px',borderRadius:6,border:'1px solid var(--border)',background:'#fff',fontSize:12,display:'flex',gap:8}}>
                      <span style={{color:'var(--tx2)'}}>{sz.size}</span>
                      <span style={{fontWeight:700,fontFamily:'JetBrains Mono'}}>{sz.qty}</span>
                    </div>)}
                  </div>
                </div>}
              </div>;
            })}
          </div>);
        })()}
      </div></div>}

      {tab === 'moves' && <div className="card"><div className="card-body np"><div className="tbl-wrap"><table><thead><tr>
        <th>Тип</th><th>СИЗ</th><th>Кол-во</th><th>Откуда</th><th>Куда</th><th>Дата</th><th>Кто</th>
      </tr></thead><tbody>
        {movements.length ? movements.map(m => <tr key={m.id}>
          <td><span className={`badge ${m.movement_type === 'receipt' ? 'b-green' : m.movement_type === 'issue' ? 'b-red' : 'b-blue'}`}>
            {m.movement_type === 'receipt' ? 'Приход' : m.movement_type === 'transfer' ? 'Перемещение' : m.movement_type === 'issue' ? 'Выдача' : m.movement_type}
          </span></td>
          <td style={{ fontWeight: 600 }}>{m.item_name}</td>
          <td>{m.quantity}</td>
          <td>{m.from_warehouse_name || '—'}</td>
          <td>{m.to_warehouse_name || '—'}</td>
          <td>{m.movement_date}</td>
          <td style={{ fontSize: 12, color: 'var(--tx2)' }}>{m.moved_by_name || '—'}</td>
        </tr>) : <tr><td colSpan="7"><Empty text="Нет движений" /></td></tr>}
      </tbody></table></div></div></div>}
    </>}

    {/* Transfer modal */}
    <Modal open={transferModal} onClose={() => setTransferModal(false)} title="Перемещение СИЗ"
      footer={<><button className="btn btn-o" onClick={() => setTransferModal(false)}>Отмена</button><button className="btn btn-p" onClick={doTransfer}>Переместить</button></>}>
      <div className="fg"><label>Куда</label>
        <select className="fc" value={tf.to_warehouse_id || ''} onChange={e => setTf({ ...tf, to_warehouse_id: e.target.value })}>
          <option value="">— Выберите склад —</option>
          {getTransferTargets().map(w => <option key={w.id} value={w.id}>{w.name} ({whTypeLabel[w.warehouse_type]})</option>)}
        </select>
      </div>
      <div className="fg"><label>СИЗ (из остатков)</label>
        <select className="fc" value={tf.siz_item_id || ''} onChange={e => { const s = stock.find(x => x.siz_item_id === e.target.value); setTf({ ...tf, siz_item_id: e.target.value, size_value: s?.size_value || '' }); }}>
          <option value="">— Выберите —</option>
          {stock.map(s => <option key={s.id} value={s.siz_item_id}>{s.item_name} {s.size_value ? `[${s.size_value}]` : ''} (ост: {s.quantity})</option>)}
        </select>
      </div>
      <div className="fg"><label>Количество</label><input className="fc" type="number" min="1" value={tf.quantity || ''} onChange={e => setTf({ ...tf, quantity: e.target.value })} /></div>
    </Modal>

    {/* Receipt modal */}
    <Modal open={receiptModal} onClose={() => setReceiptModal(false)} title="Оприходование" wide
      footer={<><button className="btn btn-o" onClick={() => setReceiptModal(false)}>Отмена</button><button className="btn btn-g" onClick={doReceipt}>Оприходовать</button></>}>

      <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
        {categories.map(c => <button key={c.id}
          className={`btn btn-sm ${rcptCat === c.id ? 'btn-p' : 'btn-o'}`}
          onClick={() => { setRcptCat(rcptCat === c.id ? '' : c.id); setTf({...tf, siz_item_id: ''}); }}
          style={{fontSize:11,padding:'4px 12px'}}>
          {c.name}
        </button>)}
        {rcptCat && <button className="btn btn-sm btn-o" onClick={() => { setRcptCat(''); setTf({...tf, siz_item_id: ''}); }} style={{fontSize:11,padding:'4px 12px',color:'var(--red)'}}>✕ Сбросить</button>}
      </div>

      <div className="fg"><label>Поиск СИЗ</label>
        <input className="fc" placeholder="Введите название или код..." value={rcptSearch} onChange={e => { setRcptSearch(e.target.value); setTf({...tf, siz_item_id: ''}); }} />
      </div>

      <div className="fg"><label>Наименование СИЗ *</label>
        <select className="fc" value={tf.siz_item_id || ''} onChange={e => {
          const id = e.target.value;
          const cat = getSelectedItemCategory(id);
          const autoSize = (cat === 'head' || cat === 'gloves') ? 'Универсальный' : '';
          setTf({ ...tf, siz_item_id: id, size_value: autoSize });
        }}>
          <option value="">{filteredReceiptItems.length ? `— Выберите (${filteredReceiptItems.length}) —` : '— Нет результатов —'}</option>
          {filteredReceiptItems.map(i => <option key={i.id} value={i.id}>{i.name}{i.code ? ` [${i.code}]` : ''}{expLabel(i.exploitation_months) ? ` — ${expLabel(i.exploitation_months)}` : ''}</option>)}
        </select>
      </div>

      {tf.siz_item_id && <div style={{padding:8,background:'var(--green-l)',borderRadius:6,marginBottom:12,fontSize:12}}>
        <strong style={{color:'var(--green)'}}>Выбрано:</strong> {items.find(i=>i.id===tf.siz_item_id)?.name}
        {items.find(i=>i.id===tf.siz_item_id)?.category_name && <span className="badge b-blue" style={{marginLeft:6,fontSize:10}}>{items.find(i=>i.id===tf.siz_item_id)?.category_name}</span>}
      </div>}

      <div className="fr">
        <div className="fg"><label>Размер</label>
          {(() => {
            const cat = getSelectedItemCategory(tf.siz_item_id);
            if (cat === 'clothing') return <select className="fc" value={tf.size_value || ''} onChange={e => setTf({...tf, size_value: e.target.value})}><option value="">-- Выберите размер --</option>{CLOTHING_SIZES.map(s => <option key={s} value={s}>{s}</option>)}</select>;
            if (cat === 'shoes') return <select className="fc" value={tf.size_value || ''} onChange={e => setTf({...tf, size_value: e.target.value})}><option value="">-- Выберите размер --</option>{SHOE_SIZES.map(s => <option key={s} value={s}>{s}</option>)}</select>;
            if (cat === 'head' || cat === 'gloves') return <input className="fc" value="Универсальный" disabled onChange={() => {}} />;
            return <input className="fc" value={tf.size_value || ''} onChange={e => setTf({...tf, size_value: e.target.value})} placeholder="Введите вручную" />;
          })()}
        </div>
        <div className="fg"><label>Количество</label><input className="fc" type="number" min="1" value={tf.quantity || ''} onChange={e => setTf({ ...tf, quantity: e.target.value })} /></div>
      </div>
      <div className="fg"><label>Документ-основание</label><input className="fc" value={tf.doc || ''} onChange={e => setTf({ ...tf, doc: e.target.value })} placeholder="Накладная №..." /></div>
    </Modal>
  </div>;
};

// ═══════ POSITIONS ═══════
const Positions = () => {
  const { isLevel, showToast } = useAuth();
  const [positions, setPositions] = useState([]);
  const [enterprises, setEnterprises] = useState([]);
  const [resUnits, setResUnits] = useState([]);
  const [departments, setDepartments] = useState([]);
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({});
  const [search, setSearch] = useState('');
  const [loading, setLoading] = useState(true);
  const canEdit = isLevel('ia', 'spbipk');
  // Фильтры таблицы
  const [fEnt, setFEnt] = useState('');
  const [fRes, setFRes] = useState('');
  const [fDep, setFDep] = useState('');

  const load = () => {
    Promise.all([apiGet('/positions'), apiGet('/org/enterprises'), apiGet('/org/res-units'), apiGet('/org/departments')])
      .then(([p, e, r, d]) => { setPositions(p); setEnterprises(e); setResUnits(r); setDepartments(d); setLoading(false); });
  };
  useEffect(load, []);

  const save = async () => {
    if (!form.name?.trim()) return showToast('Введите название должности', 'error');
    if (!form.enterprise_id) return showToast('Выберите предприятие', 'error');
    if (!form.res_unit_id) return showToast('Выберите РЭС / Службу', 'error');
    try {
      const body = { name: form.name, code: form.code, enterprise_id: form.enterprise_id, res_unit_id: form.res_unit_id, department_id: form.department_id || null };
      if (form.id) await apiPut(`/positions/${form.id}`, body);
      else await apiPost('/positions', body);
      setModal(false); setForm({}); showToast('Сохранено'); load();
    } catch (e) { showToast(e.message, 'error'); }
  };

  // Каскадная фильтрация таблицы
  const fResUnits = fEnt ? resUnits.filter(r => r.enterprise_id === fEnt) : resUnits;
  const fDeps = fRes ? departments.filter(d => d.res_unit_id === fRes) : departments;
  const filtered = positions.filter(p => {
    if (search && !p.name.toLowerCase().includes(search.toLowerCase())) return false;
    if (fEnt && p.enterprise_id !== fEnt) return false;
    if (fRes && p.res_unit_id !== fRes) return false;
    if (fDep && p.department_id !== fDep) return false;
    return true;
  });

  // Каскадная фильтрация формы
  const formResUnits = form.enterprise_id ? resUnits.filter(r => r.enterprise_id === form.enterprise_id) : [];
  const formDeps = form.res_unit_id ? departments.filter(d => d.res_unit_id === form.res_unit_id) : [];

  if (loading) return <Loader />;

  return <div>
    <div className="page-top"><div><h1>Должности</h1><div className="sub">Справочник должностей с привязкой к оргструктуре</div></div>
      <div style={{display:'flex',gap:8}}>
        {canEdit && <button className="btn btn-p" onClick={() => { setForm({}); setModal(true); }}><IC.plus style={{ width: 16, height: 16 }} /> Добавить</button>}
        {canEdit && <ImportBtn label="Импорт Excel" onImport={async (rows) => {
          const mapped = rows.map(r => ({
            name: r['Должность'] || r['Название'] || r['name'] || '',
            code: r['Код'] || r['code'] || '',
            enterprise_id: enterprises.find(e => e.name === (r['Предприятие'] || r['enterprise']))?.id || null,
            res_unit_id: resUnits.find(u => u.name === (r['РЭС/Служба'] || r['РЭС'] || r['res_unit']))?.id || null,
            department_id: departments.find(d => d.name === (r['Подразделение'] || r['department']))?.id || null,
          }));
          try { const res = await apiPost('/import/positions', { rows: mapped }); showToast(`Импортировано: ${res.imported}`); load(); } catch(e) { showToast(e.message,'error'); }
        }}/>}
        <button className="btn btn-o btn-sm" onClick={() => exportExcel(positions.map(p => ({'Должность':p.name,'Код':p.code,'Предприятие':p.enterprise_name,'РЭС/Служба':p.res_name,'Подразделение':p.department_name,'Нормы':p.norms_count,'Сотрудников':p.employees_count})), 'Должности.xlsx', 'Должности')}>Экспорт Excel</button>
      </div>
    </div>
    <div className="card">
      <div className="filter-bar" style={{borderBottom:'1px solid var(--border)'}}>
        <SearchInput value={search} onChange={setSearch} placeholder="Поиск по названию..." />
        <select className="fc" style={{width:'auto',padding:'6px 28px 6px 10px',fontSize:12}} value={fEnt} onChange={e => { setFEnt(e.target.value); setFRes(''); setFDep(''); }}>
          <option value="">Все предприятия</option>
          {enterprises.map(ent => <option key={ent.id} value={ent.id}>{ent.name}</option>)}
        </select>
        {fEnt && <select className="fc" style={{width:'auto',padding:'6px 28px 6px 10px',fontSize:12}} value={fRes} onChange={e => { setFRes(e.target.value); setFDep(''); }}>
          <option value="">Все РЭС / Службы</option>
          {fResUnits.filter(r => r.enterprise_id === fEnt).map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
        </select>}
        {fRes && fDeps.length > 0 && <select className="fc" style={{width:'auto',padding:'6px 28px 6px 10px',fontSize:12}} value={fDep} onChange={e => setFDep(e.target.value)}>
          <option value="">Все подразделения</option>
          {fDeps.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
        </select>}
        {(fEnt || fRes || fDep) && <button className="btn btn-o btn-sm" onClick={() => { setFEnt(''); setFRes(''); setFDep(''); }}>Сбросить</button>}
        <span style={{fontSize:11,color:'var(--tx3)',marginLeft:'auto'}}>Найдено: {filtered.length}</span>
      </div>
      <div className="card-body np"><div className="tbl-wrap"><table><thead><tr><th>Название</th><th>Код</th><th>Предприятие</th><th>РЭС/Служба</th><th>Подразделение</th><th>Нормы</th><th>Сотр.</th>{canEdit && <th style={{ width: 80 }}>Действия</th>}</tr></thead>
        <tbody>{filtered.length ? filtered.map(p => <tr key={p.id}>
          <td style={{ fontWeight: 600 }}>{p.name}</td>
          <td><span className="badge b-gray">{p.code || '—'}</span></td>
          <td style={{fontSize:12}}>{p.enterprise_name || <span style={{color:'var(--red)'}}>не привязано</span>}</td>
          <td style={{fontSize:12}}>{p.res_name || <span style={{color:'var(--red)'}}>не привязано</span>}</td>
          <td style={{fontSize:12}}>{p.department_name || '—'}</td>
          <td>{p.norms_count || 0}</td>
          <td>{p.employees_count || 0}</td>
          {canEdit && <td><button className="btn-icon" onClick={() => { setForm({ id: p.id, name: p.name, code: p.code, enterprise_id: p.enterprise_id, res_unit_id: p.res_unit_id, department_id: p.department_id }); setModal(true); }}><IC.edit style={{ width: 14, height: 14 }} /></button></td>}
        </tr>) : <tr><td colSpan="8"><Empty icon={IC.briefcase} text="Нет должностей" /></td></tr>}</tbody>
      </table></div></div>
    </div>
    <Modal open={modal} onClose={() => setModal(false)} title={form.id ? 'Редактировать' : 'Новая должность'}
      footer={<><button className="btn btn-o" onClick={() => setModal(false)}>Отмена</button><button className="btn btn-p" onClick={save}>Сохранить</button></>}>
      <div className="fr">
        <div className="fg" style={{flex:2}}><label>Название *</label><input className="fc" value={form.name || ''} onChange={e => setForm({ ...form, name: e.target.value })} /></div>
        <div className="fg"><label>Код</label><input className="fc" value={form.code || ''} onChange={e => setForm({ ...form, code: e.target.value })} /></div>
      </div>

      <div style={{marginTop:4,marginBottom:12,padding:12,background:'var(--blue-l)',borderRadius:8}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--blue)',marginBottom:10,textTransform:'uppercase',letterSpacing:'.5px'}}>Привязка к оргструктуре</div>

        <div className="fg" style={{marginBottom:10}}>
          <label>1. Предприятие *</label>
          <select className="fc" value={form.enterprise_id||''} onChange={e => setForm({...form, enterprise_id: e.target.value, res_unit_id: '', department_id: ''})}>
            <option value="">— Выберите предприятие —</option>
            {enterprises.map(ent => <option key={ent.id} value={ent.id}>{ent.name}</option>)}
          </select>
        </div>

        {form.enterprise_id && <div className="fg" style={{marginBottom:10}}>
          <label>2. РЭС / Служба *</label>
          <select className="fc" value={form.res_unit_id||''} onChange={e => setForm({...form, res_unit_id: e.target.value, department_id: ''})}>
            <option value="">— Выберите РЭС / Службу —</option>
            {formResUnits.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
          </select>
          {formResUnits.length === 0 && <div style={{fontSize:11,color:'var(--amber)',marginTop:4}}>⚠ В этом предприятии нет РЭС/Служб. Сначала создайте их в Оргструктуре.</div>}
        </div>}

        {form.res_unit_id && <div className="fg" style={{marginBottom:4}}>
          <label>3. Подразделение (необязательно)</label>
          <select className="fc" value={form.department_id||''} onChange={e => setForm({...form, department_id: e.target.value})}>
            <option value="">— Без подразделения —</option>
            {formDeps.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
          </select>
          {formDeps.length === 0 && <div style={{fontSize:11,color:'var(--tx3)',marginTop:4}}>В этом РЭС/Службе нет подразделений</div>}
        </div>}

        {form.enterprise_id && <div style={{marginTop:10,padding:8,background:'#fff',borderRadius:6,fontSize:12,display:'flex',alignItems:'center',gap:6}}>
          <IC.mapPin style={{width:14,height:14,color:'var(--blue)',flexShrink:0}} />
          <span style={{fontWeight:600,color:'var(--tx1)'}}>
            {enterprises.find(e=>e.id===form.enterprise_id)?.name || ''}
            {form.res_unit_id && <span style={{color:'var(--blue)'}}>{` → ${formResUnits.find(r=>r.id===form.res_unit_id)?.name || ''}`}</span>}
            {form.department_id && <span style={{color:'var(--green)'}}>{` → ${formDeps.find(d=>d.id===form.department_id)?.name || ''}`}</span>}
          </span>
        </div>}
      </div>
    </Modal>
  </div>;
};

// ═══════ SIZ DIRECTORIES ═══════
const Directories = () => {
  const { isLevel, showToast } = useAuth();
  const [categories, setCategories] = useState([]);
  const [items, setItems] = useState([]);
  const [selCat, setSelCat] = useState('');
  const [modal, setModal] = useState(false);
  const [catModal, setCatModal] = useState(false);
  const [form, setForm] = useState({});
  const [catForm, setCatForm] = useState({});
  const [search, setSearch] = useState('');
  const [loading, setLoading] = useState(true);
  const canEdit = isLevel('ia', 'spbipk');

  const reload = async () => {
    const [cats, its] = await Promise.all([apiGet('/siz/categories'), apiGet('/siz/items')]);
    setCategories(cats); setItems(its);
    if (cats.length && !cats.find(c => c.id === selCat)) setSelCat(cats[0].id);
    setLoading(false);
  };
  useEffect(() => { reload(); }, []);

  const save = async () => {
    if (!form.name?.trim()) return;
    try {
      const expMonths = form.exploitation_months ? parseInt(form.exploitation_months) : null;
      const expYears = expMonths ? +(expMonths / 12).toFixed(2) : null;
      const body = { name: form.name, code: form.code, unit: form.unit, gender: form.gender, season: form.season, exploitation_months: expMonths, exploitation_years: expYears, category_id: selCat };
      if (form.id) await apiPut(`/siz/items/${form.id}`, body);
      else await apiPost('/siz/items', body);
      setModal(false); setForm({}); showToast('Сохранено'); reload();
    } catch (e) { showToast(e.message, 'error'); }
  };

  const delItem = async (id, name) => {
    if (!confirm(`Удалить «${name}»?`)) return;
    try { await apiDel(`/siz/items/${id}`); showToast('Удалено'); reload(); }
    catch (e) { showToast(e.message, 'error'); }
  };

  const saveCat = async () => {
    if (!catForm.name?.trim()) return;
    try {
      if (catForm.id) await apiPut(`/siz/categories/${catForm.id}`, { name: catForm.name, code: catForm.code });
      else await apiPost('/siz/categories', { name: catForm.name, code: catForm.code });
      setCatModal(false); setCatForm({}); showToast('Сохранено'); reload();
    } catch (e) { showToast(e.message, 'error'); }
  };

  const delCat = async (id, name) => {
    const catItems = items.filter(i => i.category_id === id);
    if (catItems.length) return showToast(`Нельзя удалить «${name}» — в ней ${catItems.length} позиций. Сначала удалите или перенесите их.`, 'error');
    if (!confirm(`Удалить категорию «${name}»?`)) return;
    try { await apiDel(`/siz/categories/${id}`); showToast('Категория удалена'); if (selCat === id) setSelCat(''); reload(); }
    catch (e) { showToast(e.message, 'error'); }
  };

  const filtered = items.filter(i => i.category_id === selCat && (!search || i.name.toLowerCase().includes(search.toLowerCase())));
  const GENDERS = ['Мужской', 'Женский', 'Унисекс'];
  const SEASONS = ['Лето', 'Зима', 'Всесезонный'];

  if (loading) return <Loader />;

  return <div>
    <div className="page-top"><div><h1>Справочники СИЗ</h1><div className="sub">Реестр средств защиты</div></div>
      <div style={{display:'flex',gap:8}}>
        {canEdit && <button className="btn btn-p" onClick={() => { setForm({}); setModal(true); }}><IC.plus style={{ width: 16, height: 16 }} /> Добавить СИЗ</button>}
        {canEdit && <button className="btn btn-o btn-sm" onClick={() => { setCatForm({}); setCatModal(true); }}>+ Категория</button>}
        {canEdit && <ImportBtn label="Импорт Excel" onImport={async (rows) => {
          const mapped = rows.map(r => ({
            name: r['Наименование'] || r['name'] || '',
            code: r['Код'] || r['code'] || '',
            gender: r['Пол'] || r['gender'] || '',
            season: r['Сезон'] || r['season'] || '',
            exploitation_months: r['Срок (мес.)'] || r['exploitation_months'] || '',
            unit: r['Ед.'] || r['unit'] || 'шт',
            category_id: selCat,
          }));
          try { const res = await apiPost('/import/siz-items', { rows: mapped }); showToast(`Импортировано: ${res.imported}`); reload(); } catch(e) { showToast(e.message,'error'); }
        }}/>}
        <button className="btn btn-o btn-sm" onClick={() => exportExcel(items.map(i => ({'Код':i.code,'Наименование':i.name,'Пол':i.gender,'Сезон':i.season,'Срок (мес.)':i.exploitation_months,'Ед.':i.unit})), 'СИЗ_справочник.xlsx', 'СИЗ')}>Экспорт Excel</button>
      </div>
    </div>
    <div className="tabs" style={{display:'flex',alignItems:'center',flexWrap:'wrap',gap:4}}>
      {categories.map(c => <div key={c.id} style={{display:'flex',alignItems:'center',gap:0}}>
        <button className={`tab ${selCat === c.id ? 'active' : ''}`} onClick={() => { setSelCat(c.id); setSearch(''); }}>
          {c.name} <span className="badge b-gray" style={{ marginLeft: 4 }}>{c.items_count || 0}</span>
        </button>
        {canEdit && selCat === c.id && <div style={{display:'flex',gap:2,marginLeft:2}}>
          <button className="btn-icon" title="Редактировать" onClick={(e) => { e.stopPropagation(); setCatForm({id:c.id,name:c.name,code:c.code}); setCatModal(true); }}><IC.edit style={{width:12,height:12}} /></button>
          <button className="btn-icon" title="Удалить" onClick={(e) => { e.stopPropagation(); delCat(c.id, c.name); }}><IC.trash style={{width:12,height:12,color:'var(--red)'}} /></button>
        </div>}
      </div>)}
    </div>
    <div className="card"><div className="card-h"><SearchInput value={search} onChange={setSearch} /></div>
      <div className="card-body np"><div className="tbl-wrap"><table><thead><tr>
        <th>Код</th><th>Наименование</th><th>Пол</th><th>Сезон</th><th>Срок эксп.</th><th>Ед.</th>{canEdit && <th style={{width:90}}>Действия</th>}
      </tr></thead><tbody>
        {filtered.length ? filtered.map(i => {
          const em = i.exploitation_months;
          const expLabel = em ? (em >= 12 ? (em % 12 === 0 ? `${em/12} г.` : `${em} мес.`) : `${em} мес.`) : '—';
          return <tr key={i.id}>
          <td><span className="badge b-blue">{i.code || '—'}</span></td>
          <td style={{ fontWeight: 600 }}>{i.name}</td>
          <td>{i.gender || '—'}</td>
          <td><span className={`badge ${i.season === 'Зима' ? 'b-blue' : i.season === 'Лето' ? 'b-amber' : 'b-gray'}`}>{i.season || '—'}</span></td>
          <td style={{ fontFamily: 'JetBrains Mono' }}>{expLabel}</td>
          <td>{i.unit || 'шт'}</td>
          {canEdit && <td><div style={{display:'flex',gap:4}}>
            <button className="btn-icon" onClick={() => { setForm({ id: i.id, name: i.name, code: i.code, unit: i.unit, gender: i.gender, season: i.season, exploitation_months: i.exploitation_months || (i.exploitation_years ? Math.round(i.exploitation_years * 12) : '') }); setModal(true); }}><IC.edit style={{ width: 14, height: 14 }} /></button>
            <button className="btn-icon" onClick={() => delItem(i.id, i.name)}><IC.trash style={{ width: 14, height: 14, color: 'var(--red)' }} /></button>
          </div></td>}
        </tr>; }) : <tr><td colSpan="7"><Empty icon={IC.shield} text="Нет записей" /></td></tr>}
      </tbody></table></div></div>
    </div>

    {/* Item modal */}
    <Modal open={modal} onClose={() => setModal(false)} title={form.id ? 'Редактировать' : 'Добавить СИЗ'}
      footer={<><button className="btn btn-o" onClick={() => setModal(false)}>Отмена</button><button className="btn btn-p" onClick={save}>Сохранить</button></>}>
      <div className="fr">
        <div className="fg"><label>Код</label><input className="fc" value={form.code || ''} onChange={e => setForm({ ...form, code: e.target.value })} /></div>
        <div className="fg" style={{ flex: 2 }}><label>Наименование</label><input className="fc" value={form.name || ''} onChange={e => setForm({ ...form, name: e.target.value })} /></div>
      </div>
      <div className="fr">
        <div className="fg"><label>Пол</label><select className="fc" value={form.gender || ''} onChange={e => setForm({ ...form, gender: e.target.value })}><option value="">—</option>{GENDERS.map(g => <option key={g}>{g}</option>)}</select></div>
        <div className="fg"><label>Сезон</label><select className="fc" value={form.season || ''} onChange={e => setForm({ ...form, season: e.target.value })}><option value="">—</option>{SEASONS.map(g => <option key={g}>{g}</option>)}</select></div>
        <div className="fg"><label>Срок эксплуатации (мес.)</label><input className="fc" type="number" min="1" step="1" value={form.exploitation_months || ''} onChange={e => setForm({ ...form, exploitation_months: e.target.value })} placeholder="12" />
          {form.exploitation_months > 0 && <div style={{fontSize:11,color:'var(--tx3)',marginTop:3}}>= {form.exploitation_months >= 12 ? `${(form.exploitation_months / 12).toFixed(1)} г.` : `${form.exploitation_months} мес.`}</div>}
        </div>
      </div>
      <div className="fg"><label>Единица измерения</label><input className="fc" value={form.unit || ''} onChange={e => setForm({ ...form, unit: e.target.value })} placeholder="шт" /></div>
    </Modal>

    {/* Category modal */}
    <Modal open={catModal} onClose={() => setCatModal(false)} title={catForm.id ? 'Редактировать категорию' : 'Новая категория'}
      footer={<><button className="btn btn-o" onClick={() => setCatModal(false)}>Отмена</button><button className="btn btn-p" onClick={saveCat}>Сохранить</button></>}>
      <div className="fg"><label>Название</label><input className="fc" value={catForm.name || ''} onChange={e => setCatForm({...catForm, name: e.target.value})} placeholder="Например: Респираторы" /></div>
      <div className="fg"><label>Код (латиницей)</label><input className="fc" value={catForm.code || ''} onChange={e => setCatForm({...catForm, code: e.target.value})} placeholder="respirators" /></div>
    </Modal>
  </div>;
};

// ═══════ TON ═══════
const TonPage = () => {
  const { isLevel, showToast } = useAuth();
  const [positions, setPositions] = useState([]);
  const [items, setItems] = useState([]);
  const [categories, setCategories] = useState([]);
  const [norms, setNorms] = useState([]);
  const [selPos, setSelPos] = useState('');
  const [selItem, setSelItem] = useState('');
  const [tonCat, setTonCat] = useState('');
  const [tonSearch, setTonSearch] = useState('');
  const [posSearch, setPosSearch] = useState('');
  const [loading, setLoading] = useState(true);
  const canEdit = isLevel('ia', 'spbipk');

  useEffect(() => {
    Promise.all([apiGet('/positions'), apiGet('/siz/items'), apiGet('/siz/categories'), apiGet('/ton')]).then(([p, i, c, n]) => {
      setPositions(p); setItems(i); setCategories(c); setNorms(n); setLoading(false);
    });
  }, []);

  const posNorms = norms.filter(n => n.position_id === selPos);

  // Фильтрованные СИЗ для добавления (исключая уже привязанные)
  const availableItems = items.filter(i => {
    if (posNorms.some(n => n.siz_item_id === i.id)) return false;
    if (tonCat && i.category_id !== tonCat) return false;
    if (tonSearch && !i.name.toLowerCase().includes(tonSearch.toLowerCase()) && !(i.code||'').toLowerCase().includes(tonSearch.toLowerCase())) return false;
    return true;
  });

  // Фильтр должностей по поиску
  const filteredPositions = positions.filter(p =>
    !posSearch || p.name.toLowerCase().includes(posSearch.toLowerCase()) || (p.res_name||'').toLowerCase().includes(posSearch.toLowerCase()) || (p.department_name||'').toLowerCase().includes(posSearch.toLowerCase())
  );

  const expLabel = (m) => m ? (m >= 12 ? (m % 12 === 0 ? `${m/12} г.` : `${m} мес.`) : `${m} мес.`) : '';

  const addNorm = async () => {
    if (!selItem || !selPos) return;
    try {
      await apiPost(`/positions/${selPos}/norms`, { siz_item_id: selItem });
      showToast('Норма добавлена');
      setNorms(await apiGet('/ton'));
      setSelItem('');
    } catch (e) { showToast(e.message, 'error'); }
  };

  const delNorm = async (id) => {
    try { await apiDel(`/ton/${id}`); showToast('Удалено'); setNorms(await apiGet('/ton')); }
    catch (e) { showToast(e.message, 'error'); }
  };

  if (loading) return <Loader />;

  return <div>
    <div className="page-top"><div><h1>ТОН — Типовые нормы</h1><div className="sub">Привязка СИЗ к должностям</div></div>
      <button className="btn btn-o btn-sm" onClick={() => exportExcel(norms.map(n => ({'Должность':n.position_name,'Код должности':n.position_code,'Категория':n.category_name,'СИЗ':n.item_name,'Код СИЗ':n.item_code,'Ед.':n.unit})), 'ТОН.xlsx', 'ТОН')}>Экспорт Excel</button>
    </div>
    <div className="card"><div className="card-body">
      <div className="fg" style={{marginBottom:16}}>
        <label>Должность</label>
        <input className="fc" placeholder="Поиск должности..." value={posSearch} onChange={e => setPosSearch(e.target.value)} style={{maxWidth:500,marginBottom:6}} />
        <select className="fc" value={selPos} onChange={e => { setSelPos(e.target.value); setTonCat(''); setTonSearch(''); setSelItem(''); }} style={{ maxWidth: 500 }}>
          <option value="">— Выберите должность ({filteredPositions.length}) —</option>
          {filteredPositions.map(p => <option key={p.id} value={p.id}>{p.name}{p.enterprise_name ? ` | ${p.enterprise_name}` : ''}{p.res_name ? ` → ${p.res_name}` : ''}{p.department_name ? ` → ${p.department_name}` : ''}</option>)}
        </select>
      </div>

      {selPos && <>
        {canEdit && <div style={{padding:14,background:'var(--blue-l)',borderRadius:10,marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--blue)',marginBottom:10}}>Добавить СИЗ в норму</div>

          <div style={{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap'}}>
            {categories.map(c => <button key={c.id}
              className={`btn btn-sm ${tonCat === c.id ? 'btn-p' : 'btn-o'}`}
              onClick={() => { setTonCat(tonCat === c.id ? '' : c.id); setSelItem(''); }}
              style={{fontSize:11,padding:'4px 12px'}}>
              {c.name}
            </button>)}
            {tonCat && <button className="btn btn-sm btn-o" onClick={() => { setTonCat(''); setSelItem(''); }} style={{fontSize:11,padding:'4px 12px',color:'var(--red)'}}>✕ Сбросить</button>}
          </div>

          <div className="fg" style={{marginBottom:10}}>
            <input className="fc" placeholder="Поиск по названию или коду СИЗ..." value={tonSearch} onChange={e => { setTonSearch(e.target.value); setSelItem(''); }} />
          </div>

          <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
            <div className="fg" style={{ flex: 1, marginBottom: 0 }}>
              <select className="fc" value={selItem} onChange={e => setSelItem(e.target.value)}>
                <option value="">{availableItems.length ? `— Выберите СИЗ (${availableItems.length}) —` : '— Нет результатов —'}</option>
                {availableItems.map(i => <option key={i.id} value={i.id}>{i.category_name ? `[${i.category_name}] ` : ''}{i.name}{i.code ? ` [${i.code}]` : ''}{expLabel(i.exploitation_months) ? ` — ${expLabel(i.exploitation_months)}` : ''}</option>)}
              </select>
            </div>
            <button className="btn btn-p" onClick={addNorm} disabled={!selItem}><IC.plus style={{ width: 14, height: 14 }} /> Добавить</button>
          </div>
        </div>}

        <div style={{fontSize:13,fontWeight:700,marginBottom:8,color:'var(--tx1)'}}>Привязанные СИЗ ({posNorms.length})</div>
        <div className="tbl-wrap"><table><thead><tr><th>Категория</th><th>Наименование</th><th>Код</th><th>Срок</th><th>Ед.</th>{canEdit && <th>Действия</th>}</tr></thead>
          <tbody>{posNorms.length ? posNorms.map(n => <tr key={n.id}>
            <td><span className="badge b-gray">{n.category_name || '—'}</span></td>
            <td style={{ fontWeight: 600 }}>{n.item_name}</td>
            <td>{n.item_code || '—'}</td>
            <td style={{fontFamily:'JetBrains Mono',fontSize:12}}>{expLabel(n.exploitation_months) || (n.exploitation_years ? `${n.exploitation_years} г.` : '—')}</td>
            <td>{n.unit || 'шт'}</td>
            {canEdit && <td><button className="btn-icon" onClick={() => delNorm(n.id)}><IC.trash style={{ width: 14, height: 14, color: 'var(--red)' }} /></button></td>}
          </tr>) : <tr><td colSpan="6"><Empty icon={IC.link} text="Нет привязанных СИЗ" /></td></tr>}
          </tbody>
        </table></div>
      </>}
      {!selPos && <Empty icon={IC.briefcase} text="Выберите должность" />}
    </div></div>
  </div>;
};

// ═══════ EMPLOYEES ═══════
const EmployeesPage = ({ navigate }) => {
  const { isLevel, showToast } = useAuth();
  const [employees, setEmployees] = useState([]);
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({});
  const [search, setSearch] = useState('');
  const [positions, setPositions] = useState([]);
  const [enterprises, setEnterprises] = useState([]);
  const [resUnits, setResUnits] = useState([]);
  const [departments, setDepartments] = useState([]);
  const [loading, setLoading] = useState(true);
  const canEdit = isLevel('ia', 'spbipk');

  const load = () => {
    Promise.all([apiGet('/employees'), apiGet('/positions'), apiGet('/org/enterprises'), apiGet('/org/res-units'), apiGet('/org/departments')])
      .then(([e, p, ent, res, dep]) => { setEmployees(e); setPositions(p); setEnterprises(ent); setResUnits(res); setDepartments(dep); setLoading(false); });
  };
  useEffect(load, []);

  const save = async () => {
    if (!form.last_name?.trim()) return showToast('Введите фамилию', 'error');
    if (!form.enterprise_id) return showToast('Выберите предприятие', 'error');
    if (!form.res_unit_id) return showToast('Выберите РЭС / Службу', 'error');
    try {
      const body = { last_name: form.last_name, first_name: form.first_name, middle_name: form.middle_name, position_id: form.position_id || null, enterprise_id: form.enterprise_id || null, res_unit_id: form.res_unit_id || null, department_id: form.department_id || null, clothing_size: form.clothing_size, shoe_size: form.shoe_size, employee_number: form.employee_number };
      if (form.id) await apiPut(`/employees/${form.id}`, body);
      else await apiPost('/employees', body);
      setModal(false); setForm({}); showToast('Сохранено'); load();
    } catch (e) { showToast(e.message, 'error'); }
  };

  const filtered = employees.filter(e => !search || `${e.last_name} ${e.first_name} ${e.middle_name}`.toLowerCase().includes(search.toLowerCase()));

  // Жёсткая каскадная фильтрация
  const formResUnits = form.enterprise_id ? resUnits.filter(r => r.enterprise_id === form.enterprise_id) : [];
  const formDeps = form.res_unit_id ? departments.filter(d => d.res_unit_id === form.res_unit_id) : [];
  const formPositions = positions.filter(p => {
    if (!form.enterprise_id) return false;
    if (p.enterprise_id && p.enterprise_id !== form.enterprise_id) return false;
    if (form.res_unit_id && p.res_unit_id && p.res_unit_id !== form.res_unit_id) return false;
    if (form.department_id && p.department_id && p.department_id !== form.department_id) return false;
    return true;
  });

  if (loading) return <Loader />;

  return <div>
    <div className="page-top"><div><h1>Карточки персонала</h1><div className="sub">Реестр сотрудников</div></div>
      <div style={{display:'flex',gap:8}}>
        {canEdit && <button className="btn btn-p" onClick={() => { setForm({}); setModal(true); }}><IC.plus style={{ width: 16, height: 16 }} /> Создать</button>}
        {canEdit && <ImportBtn label="Импорт Excel" onImport={async (rows) => {
          const mapped = rows.map(r => ({
            last_name: r['Фамилия'] || r['last_name'] || '',
            first_name: r['Имя'] || r['first_name'] || '',
            middle_name: r['Отчество'] || r['middle_name'] || '',
            employee_number: r['Таб. номер'] || r['Табельный номер'] || r['employee_number'] || '',
            enterprise_id: enterprises.find(e => e.name === (r['Предприятие'] || r['enterprise']))?.id || null,
            res_unit_id: resUnits.find(e => e.name === (r['РЭС/Служба'] || r['РЭС'] || r['res_unit']))?.id || null,
            department_id: departments.find(e => e.name === (r['Подразделение'] || r['department']))?.id || null,
            position_id: positions.find(e => e.name === (r['Должность'] || r['position']))?.id || null,
            clothing_size: r['Размер одежды'] || r['clothing_size'] || '',
            shoe_size: r['Размер обуви'] || r['shoe_size'] || '',
          }));
          try { const res = await apiPost('/import/employees', { rows: mapped }); showToast(`Импортировано: ${res.imported}`); load(); } catch(e) { showToast(e.message,'error'); }
        }}/>}
        <button className="btn btn-o btn-sm" onClick={() => exportExcel(employees.map(e => ({'Фамилия':e.last_name,'Имя':e.first_name,'Отчество':e.middle_name,'Предприятие':e.enterprise_name,'РЭС/Служба':e.res_name,'Подразделение':e.department_name,'Должность':e.position_name,'Размер одежды':e.clothing_size,'Размер обуви':e.shoe_size,'Таб. номер':e.employee_number})), 'Персонал.xlsx', 'Персонал')}>Экспорт Excel</button>
      </div>
    </div>
    <div className="card" style={{ marginBottom: 16 }}><div className="card-body" style={{ padding: '12px 20px' }}>
      <SearchInput value={search} onChange={setSearch} placeholder="Поиск по ФИО..." />
    </div></div>

    <div className="card"><div className="card-body np"><div className="tbl-wrap"><table><thead><tr>
      <th>ФИО</th><th>Предприятие</th><th>РЭС/Служба</th><th>Подразделение</th><th>Должность</th><th>Одежда</th><th>Обувь</th><th>Действия</th>
    </tr></thead><tbody>
      {filtered.length ? filtered.map(e => <tr key={e.id}>
        <td><span style={{ fontWeight: 700, cursor: 'pointer', color: 'var(--blue)' }} onClick={() => navigate(`/employee/${e.id}`)}>{e.last_name} {e.first_name} {e.middle_name || ''}</span></td>
        <td>{e.enterprise_name || '—'}</td>
        <td>{e.res_name || '—'}</td>
        <td>{e.department_name || '—'}</td>
        <td><span className="badge b-blue">{e.position_name || '—'}</span></td>
        <td style={{ fontSize: 12, fontFamily: 'JetBrains Mono' }}>{e.clothing_size || '—'}</td>
        <td style={{ fontSize: 12, fontFamily: 'JetBrains Mono' }}>{e.shoe_size || '—'}</td>
        <td><div style={{ display: 'flex', gap: 4 }}>
          <button className="btn-icon" onClick={() => navigate(`/employee/${e.id}`)}><IC.eye style={{ width: 14, height: 14 }} /></button>
          {canEdit && <button className="btn-icon" onClick={() => { setForm({ id: e.id, last_name: e.last_name, first_name: e.first_name, middle_name: e.middle_name, position_id: e.position_id, enterprise_id: e.enterprise_id, res_unit_id: e.res_unit_id, department_id: e.department_id, clothing_size: e.clothing_size, shoe_size: e.shoe_size, employee_number: e.employee_number }); setModal(true); }}><IC.edit style={{ width: 14, height: 14 }} /></button>}
        </div></td>
      </tr>) : <tr><td colSpan="8"><Empty icon={IC.users} text="Нет сотрудников" /></td></tr>}
    </tbody></table></div></div></div>

    <Modal open={modal} onClose={() => setModal(false)} title={form.id ? 'Редактировать сотрудника' : 'Новый сотрудник'} wide
      footer={<><button className="btn btn-o" onClick={() => setModal(false)}>Отмена</button><button className="btn btn-p" onClick={save}>Сохранить</button></>}>
      <div className="fr">
        <div className="fg"><label>Фамилия *</label><input className="fc" value={form.last_name || ''} onChange={e => setForm({ ...form, last_name: e.target.value })} /></div>
        <div className="fg"><label>Имя</label><input className="fc" value={form.first_name || ''} onChange={e => setForm({ ...form, first_name: e.target.value })} /></div>
        <div className="fg"><label>Отчество</label><input className="fc" value={form.middle_name || ''} onChange={e => setForm({ ...form, middle_name: e.target.value })} /></div>
      </div>
      <div className="fg"><label>Табельный номер</label><input className="fc" value={form.employee_number || ''} onChange={e => setForm({ ...form, employee_number: e.target.value })} /></div>

      <div style={{marginTop:4,marginBottom:12,padding:12,background:'var(--blue-l)',borderRadius:8}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--blue)',marginBottom:10,textTransform:'uppercase',letterSpacing:'.5px'}}>Привязка к оргструктуре</div>

        <div className="fg" style={{marginBottom:10}}>
          <label>1. Предприятие *</label>
          <select className="fc" value={form.enterprise_id||''} onChange={e => setForm({...form, enterprise_id: e.target.value, res_unit_id: '', department_id: '', position_id: ''})}>
            <option value="">— Выберите предприятие —</option>
            {enterprises.map(ent => <option key={ent.id} value={ent.id}>{ent.name}</option>)}
          </select>
        </div>

        {form.enterprise_id && <div className="fg" style={{marginBottom:10}}>
          <label>2. РЭС / Служба *</label>
          <select className="fc" value={form.res_unit_id||''} onChange={e => setForm({...form, res_unit_id: e.target.value, department_id: '', position_id: ''})}>
            <option value="">— Выберите РЭС / Службу —</option>
            {formResUnits.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
          </select>
          {formResUnits.length === 0 && <div style={{fontSize:11,color:'var(--amber)',marginTop:4}}>⚠ В этом предприятии нет РЭС/Служб. Сначала создайте их в Оргструктуре.</div>}
        </div>}

        {form.res_unit_id && <div className="fg" style={{marginBottom:4}}>
          <label>3. Подразделение (если требуется)</label>
          <select className="fc" value={form.department_id||''} onChange={e => setForm({...form, department_id: e.target.value, position_id: ''})}>
            <option value="">— Без подразделения —</option>
            {formDeps.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
          </select>
          {formDeps.length === 0 && <div style={{fontSize:11,color:'var(--tx3)',marginTop:4}}>В этом РЭС/Службе нет подразделений</div>}
        </div>}

        {form.enterprise_id && <div style={{marginTop:10,padding:8,background:'#fff',borderRadius:6,fontSize:12,display:'flex',alignItems:'center',gap:6}}>
          <IC.mapPin style={{width:14,height:14,color:'var(--blue)',flexShrink:0}} />
          <span style={{fontWeight:600,color:'var(--tx1)'}}>
            {enterprises.find(e=>e.id===form.enterprise_id)?.name || ''}
            {form.res_unit_id && <span style={{color:'var(--blue)'}}>{` → ${formResUnits.find(r=>r.id===form.res_unit_id)?.name || ''}`}</span>}
            {form.department_id && <span style={{color:'var(--green)'}}>{` → ${formDeps.find(d=>d.id===form.department_id)?.name || ''}`}</span>}
          </span>
        </div>}
      </div>

      <div className="fg"><label>Должность</label>
        <select className="fc" value={form.position_id || ''} onChange={e => setForm({ ...form, position_id: e.target.value })}>
          <option value="">{form.res_unit_id ? '— Выберите должность —' : '— Сначала выберите предприятие и РЭС —'}</option>
          {formPositions.map(x => <option key={x.id} value={x.id}>{x.name}{x.department_name ? ` (${x.department_name})` : ''}</option>)}
        </select>
        {form.res_unit_id && formPositions.length === 0 && <div style={{fontSize:11,color:'var(--amber)',marginTop:4}}>⚠ Нет должностей для этой ветки оргструктуры. Сначала создайте их в справочнике Должности.</div>}
      </div>

      <div className="fr">
        <div className="fg"><label>Размер одежды</label><select className="fc" value={form.clothing_size || ''} onChange={e => setForm({ ...form, clothing_size: e.target.value })}><option value="">-- Выберите --</option>{CLOTHING_SIZES_G.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
        <div className="fg"><label>Размер обуви</label><select className="fc" value={form.shoe_size || ''} onChange={e => setForm({ ...form, shoe_size: e.target.value })}><option value="">-- Выберите --</option>{SHOE_SIZES_G.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
      </div>
    </Modal>
  </div>;
};

// ═══════ EMPLOYEE CARD ═══════
const EmployeeCard = ({ id, navigate }) => {
  const { isLevel, showToast } = useAuth();
  const [emp, setEmp] = useState(null);
  const [issued, setIssued] = useState([]);
  const [cards, setCards] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    Promise.all([
      apiGet(`/employees/${id}`),
      apiGet(`/employee-siz/${id}`),
      apiGet(`/siz-cards/by-employee/${id}`).catch(() => [])
    ]).then(([e, iss, crds]) => {
      setEmp(e); setIssued(iss); setCards(crds); setLoading(false);
    }).catch(() => setLoading(false));
  }, [id]);

  if (loading) return <Loader />;
  if (!emp) return <div><button className="btn btn-o" onClick={() => navigate('/employees')}><IC.arrowLeft style={{ width: 16, height: 16 }} /> Назад</button><Empty icon={IC.user} text="Сотрудник не найден" /></div>;

  const fio = `${emp.last_name || ''} ${emp.first_name || ''} ${emp.middle_name || ''}`.trim();

  const daysLeft = (card) => {
    if (!card.exploitation_end) return null;
    return Math.ceil((new Date(card.exploitation_end) - new Date()) / (1000*60*60*24));
  };
  const daysClass = (d) => { if (d === null) return ''; if (d < 0) return 'danger'; if (d < 30) return 'warn'; return 'ok'; };
  const expiredCount = cards.filter(c => { const dl = daysLeft(c); return dl !== null && dl < 0; }).length;

  return <div>
    <div className="breadcrumb"><span onClick={() => navigate('/employees')}>Персонал</span> / <span style={{ color: 'var(--tx1)', cursor: 'default' }}>{fio}</span></div>
    <div className="page-top"><div><h1>{fio}</h1><div className="sub">{emp.position_name || '—'}</div></div></div>

    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 20 }}>
      <div className="card"><div className="card-h"><h3>Данные сотрудника</h3></div><div className="card-body">
        {[['Предприятие', emp.enterprise_name], ['РЭС / Служба', emp.res_name], ['Подразделение', emp.department_name], ['Должность', emp.position_name], ['Размер одежды', emp.clothing_size], ['Размер обуви', emp.shoe_size]].map(([l, v], i) =>
          <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', borderBottom: i < 5 ? '1px solid var(--border)' : 'none' }}>
            <span style={{ fontSize: 12, color: 'var(--tx2)', fontWeight: 600 }}>{l}</span>
            <span style={{ fontSize: 13, fontWeight: 600 }}>{v || '—'}</span>
          </div>)}
      </div></div>
      <div className="card"><div className="card-h"><h3>СИЗ на руках</h3></div><div className="card-body">
        <div className="stats" style={{ marginBottom: 0 }}>
          <div className="stat" style={{ padding: 14 }}><div className="stat-ic gr" style={{ width: 36, height: 36 }}><IC.check style={{ width: 18, height: 18 }} /></div><div><div className="stat-val" style={{ fontSize: 22 }}>{cards.length || issued.length}</div><div className="stat-lbl">Выдано</div></div></div>
          <div className="stat" style={{ padding: 14 }}><div className="stat-ic bl" style={{ width: 36, height: 36 }}><IC.scroll style={{ width: 18, height: 18 }} /></div><div><div className="stat-val" style={{ fontSize: 22 }}>{emp.norms?.length || 0}</div><div className="stat-lbl">Положено</div></div></div>
          {expiredCount > 0 && <div className="stat" style={{ padding: 14 }}><div className="stat-ic rd" style={{ width: 36, height: 36 }}><IC.alertTriangle style={{ width: 18, height: 18 }} /></div><div><div className="stat-val" style={{ fontSize: 22 }}>{expiredCount}</div><div className="stat-lbl">Просрочено</div></div></div>}
        </div>
      </div></div>
    </div>

    {cards.length > 0 ? <div className="card"><div className="card-h"><h3>Карточки СИЗ (индивидуальный учёт)</h3></div><div className="card-body np"><div className="tbl-wrap"><table><thead><tr>
      <th>Номер</th><th>Категория</th><th>Наименование</th><th>Размер</th><th>Дата выдачи</th><th>Срок до</th><th>Осталось</th>
    </tr></thead><tbody>
      {cards.map(c => {
        const dl = daysLeft(c);
        return <tr key={c.id} className={dl !== null && dl < 0 ? 'row-expired' : ''}>
          <td><span className="badge b-blue" style={{fontFamily:'JetBrains Mono',fontSize:11,cursor:'pointer'}} onClick={() => navigate('/siz-card/'+c.id)}>{c.card_number}</span></td>
          <td><span className="badge b-gray">{c.category_name || '—'}</span></td>
          <td style={{ fontWeight: 600 }}>{c.item_name}</td>
          <td>{c.size_value || '—'}</td>
          <td style={{fontFamily:'JetBrains Mono',fontSize:12}}>{c.issue_date || '—'}</td>
          <td style={{fontFamily:'JetBrains Mono',fontSize:12}}>{c.exploitation_end || '—'}</td>
          <td>{dl !== null ? <span className={`days-badge ${daysClass(dl)}`}>{dl < 0 ? `${Math.abs(dl)} дн. просрочка` : `${dl} дн.`}</span> : '—'}</td>
        </tr>;
      })}
    </tbody></table></div></div></div>
    : <div className="card"><div className="card-h"><h3>Выданные СИЗ</h3></div><div className="card-body np"><div className="tbl-wrap"><table><thead><tr>
      <th>Категория</th><th>Наименование</th><th>Размер</th><th>Кол-во</th><th>Дата выдачи</th><th>Склад</th>
    </tr></thead><tbody>
      {issued.length ? issued.map(i => <tr key={i.id}>
        <td><span className="badge b-gray">{i.category_name || '—'}</span></td>
        <td style={{ fontWeight: 600 }}>{i.item_name}</td>
        <td>{i.size_value || '—'}</td>
        <td>{i.quantity}</td>
        <td>{i.issued_date}</td>
        <td style={{ fontSize: 12, color: 'var(--tx2)' }}>{i.warehouse_name || '—'}</td>
      </tr>) : <tr><td colSpan="6"><Empty icon={IC.shield} text="Нет выданных СИЗ" /></td></tr>}
    </tbody></table></div></div></div>}

    {emp.norms?.length > 0 && <div className="card" style={{ marginTop: 16 }}><div className="card-h"><h3>Положенные по ТОН</h3></div><div className="card-body np"><div className="tbl-wrap"><table><thead><tr>
      <th>Категория</th><th>Наименование</th><th>Кол-во</th><th>Ед.</th>
    </tr></thead><tbody>
      {emp.norms.map(n => <tr key={n.id}>
        <td><span className="badge b-gray">{n.category_name || '—'}</span></td>

        <td>{n.quantity}</td>
        <td>{n.unit || 'шт'}</td>
      </tr>)}
    </tbody></table></div></div></div>}

};

const AdminUsers = () => {
  const { showToast } = useAuth();
  const [users, setUsers] = useState([]);
  const [roles, setRoles] = useState([]);
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({});
  const [enterprises, setEnterprises] = useState([]);
  const [resUnits, setResUnits] = useState([]);
  const [spbipks, setSpbipks] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = () => {
    Promise.all([apiGet('/admin/users'), apiGet('/auth/roles'), apiGet('/org/enterprises'), apiGet('/org/res-units'), apiGet('/org/spbipk')])
      .then(([u, r, e, res, sp]) => { setUsers(u); setRoles(r); setEnterprises(e); setResUnits(res); setSpbipks(sp); setLoading(false); });
  };
  useEffect(load, []);

  const save = async () => {
    try {
      if (form.id) {
        await apiPut(`/admin/users/${form.id}`, form);
      } else {
        await apiPost('/auth/register', { username: form.username, password: form.password || 'changeme', full_name: form.full_name, role_id: form.role_id, enterprise_id: form.enterprise_id || null, res_unit_id: form.res_unit_id || null, spbipk_id: form.spbipk_id || null });
      }
      setModal(false); setForm({}); showToast('Сохранено'); load();
    } catch (e) { showToast(e.message, 'error'); }
  };

  const levelBadge = { ia: 'b-purple', enterprise: 'b-blue', spbipk: 'b-amber', res: 'b-green' };

  if (loading) return <Loader />;

  return <div>
    <div className="page-top"><div><h1>Пользователи</h1><div className="sub">Управление учётными записями</div></div>
      <button className="btn btn-p" onClick={() => { setForm({}); setModal(true); }}><IC.plus style={{ width: 16, height: 16 }} /> Создать</button>
    </div>
    <div className="card"><div className="card-body np"><div className="tbl-wrap"><table><thead><tr>
      <th>ФИО</th><th>Логин</th><th>Роль</th><th>Предприятие</th><th>РЭС</th><th>Посл. вход</th><th>Действия</th>
    </tr></thead><tbody>
      {users.map(u => <tr key={u.id}>
        <td style={{ fontWeight: 600 }}>{u.full_name}</td>
        <td style={{ fontFamily: 'JetBrains Mono', fontSize: 12 }}>{u.username}</td>
        <td><span className={`badge ${levelBadge[u.role_level] || 'b-gray'}`}>{u.role_name}</span></td>
        <td>{u.enterprise_name || '—'}</td>
        <td>{u.res_name || '—'}</td>
        <td style={{ fontSize: 12, color: 'var(--tx2)' }}>{u.last_login ? new Date(u.last_login).toLocaleDateString('ru-RU') : '—'}</td>
        <td><button className="btn-icon" onClick={() => { setForm({ id: u.id, full_name: u.full_name, email: u.email, phone: u.phone, role_id: u.role_id, enterprise_id: u.enterprise_id, res_unit_id: u.res_unit_id }); setModal(true); }}><IC.edit style={{ width: 14, height: 14 }} /></button></td>
      </tr>)}
    </tbody></table></div></div></div>

    <Modal open={modal} onClose={() => setModal(false)} title={form.id ? 'Редактировать пользователя' : 'Новый пользователь'} wide
      footer={<><button className="btn btn-o" onClick={() => setModal(false)}>Отмена</button><button className="btn btn-p" onClick={save}>Сохранить</button></>}>
      {!form.id && <div className="fr">
        <div className="fg"><label>Логин</label><input className="fc" value={form.username || ''} onChange={e => setForm({ ...form, username: e.target.value })} /></div>
        <div className="fg"><label>Пароль</label><input className="fc" type="password" value={form.password || ''} onChange={e => setForm({ ...form, password: e.target.value })} placeholder="changeme" /></div>
      </div>}
      <div className="fg"><label>ФИО</label><input className="fc" value={form.full_name || ''} onChange={e => setForm({ ...form, full_name: e.target.value })} /></div>
      <div className="fr">
        <div className="fg"><label>Email</label><input className="fc" value={form.email || ''} onChange={e => setForm({ ...form, email: e.target.value })} /></div>
        <div className="fg"><label>Телефон</label><input className="fc" value={form.phone || ''} onChange={e => setForm({ ...form, phone: e.target.value })} /></div>
      </div>
      <div className="fg"><label>Роль</label>
        <select className="fc" value={form.role_id || ''} onChange={e => setForm({ ...form, role_id: e.target.value })}>
          <option value="">—</option>
          {roles.map(r => <option key={r.id} value={r.id}>{r.display_name} ({r.level})</option>)}
        </select>
      </div>
      <div className="fr">
        <div className="fg"><label>Предприятие</label><select className="fc" value={form.enterprise_id || ''} onChange={e => setForm({ ...form, enterprise_id: e.target.value })}><option value="">— Все —</option>{enterprises.map(x => <option key={x.id} value={x.id}>{x.name}</option>)}</select></div>
        <div className="fg"><label>СПБиПК</label><select className="fc" value={form.spbipk_id || ''} onChange={e => setForm({ ...form, spbipk_id: e.target.value })}><option value="">—</option>{spbipks.map(x => <option key={x.id} value={x.id}>{x.name}</option>)}</select></div>
        <div className="fg"><label>РЭС/Служба</label><select className="fc" value={form.res_unit_id || ''} onChange={e => setForm({ ...form, res_unit_id: e.target.value })}><option value="">—</option>{resUnits.map(x => <option key={x.id} value={x.id}>{x.name}</option>)}</select></div>
      </div>
      {form.id && <div className="fg"><label>Новый пароль (оставьте пустым чтобы не менять)</label><input className="fc" type="password" value={form.new_password || ''} onChange={e => setForm({ ...form, new_password: e.target.value })} /></div>}
    </Modal>
  </div>;
};
